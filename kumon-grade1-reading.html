<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kumon Reading · Grade 1</title>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Tokens ── */
:root {
  --bg:      #eef6f0;
  --card:    #ffffff;
  --border:  #c8ddd0;
  --text:    #1b2d23;
  --muted:   #5a7060;
  --primary: #2e7d32;
  --accent:  #f57f17;
  --red:     #c62828;
  --gold:    #f9a825;
  --r0:      #e65100;
  --r1:      #1565c0;
  --r2:      #6a1b9a;
  --r3:      #2e7d32;
  --r4:      #ad1457;
  --r5:      #00695c;
  --r6:      #4527a0;
}

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text);
}

/* ── Screen system ── */
.screen { display: none; flex-direction: column; min-height: 100vh; }
.screen.active { display: flex; }

/* ── Shared card ── */
.card {
  background: var(--card);
  border-radius: 24px;
  box-shadow: 0 4px 20px rgba(0,0,0,.08);
  padding: 24px 22px;
}
.card-sm { border-radius: 18px; padding: 16px 18px; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  border: none; border-radius: 999px; cursor: pointer;
  font-family: inherit; font-weight: 700; font-size: 1rem;
  padding: 14px 28px; transition: transform .12s, box-shadow .12s;
}
.btn:active { transform: scale(.95); }
.btn-primary { background: var(--primary); color: #fff; box-shadow: 0 4px 14px rgba(46,125,50,.35); }
.btn-primary:hover { box-shadow: 0 6px 20px rgba(46,125,50,.45); }
.btn-outline { background: var(--card); color: var(--primary); border: 2px solid var(--primary); }
.btn-ghost   { background: transparent; color: var(--muted); border: 2px solid var(--border); font-size: .9rem; padding: 10px 20px; }
.btn-lg      { font-size: 1.2rem; padding: 18px 36px; }
.btn-icon    { width: 48px; height: 48px; padding: 0; border-radius: 50%; background: var(--bg); border: 2px solid var(--border); font-size: 1.3rem; }

/* ════════════════════════════════════
   SCREEN 1 — WELCOME
════════════════════════════════════ */
#screen-welcome {
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
  background: linear-gradient(160deg, #e8f5e9 0%, #e3f2fd 100%);
}
.welcome-logo {
  font-size: 3.5rem;
  margin-bottom: 6px;
  animation: bob 2.8s ease-in-out infinite alternate;
}
@keyframes bob { from { transform: translateY(0); } to { transform: translateY(-8px); } }
.welcome-title {
  font-size: 2rem; font-weight: 900; color: var(--primary);
  text-align: center; margin-bottom: 4px;
}
.welcome-sub {
  font-size: 1rem; color: var(--muted); text-align: center;
  margin-bottom: 40px;
}
.welcome-question {
  font-size: 1.25rem; font-weight: 700; color: var(--text);
  text-align: center; margin-bottom: 20px;
}
.profiles-grid {
  display: flex; gap: 16px; justify-content: center;
  flex-wrap: wrap; margin-bottom: 28px;
}
.profile-btn {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  background: var(--card); border: 3px solid var(--border);
  border-radius: 24px; padding: 20px 24px;
  cursor: pointer; transition: all .15s;
  min-width: 110px;
}
.profile-btn:hover { border-color: var(--primary); transform: scale(1.06); box-shadow: 0 6px 20px rgba(46,125,50,.25); }
.profile-btn:active { transform: scale(.97); }
.profile-btn.selected { border-color: var(--primary); background: #e8f5e9; }
.profile-avatar { font-size: 3rem; }
.profile-name   { font-size: .95rem; font-weight: 800; color: var(--text); }

/* ════════════════════════════════════
   SCREEN 2 — LEVEL MAP
════════════════════════════════════ */
#screen-map { background: var(--bg); }

.map-header {
  background: var(--primary);
  color: #fff;
  padding: 16px 20px 14px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 10px rgba(0,0,0,.2);
  position: sticky; top: 0; z-index: 100;
}
.map-header-title { font-size: 1.15rem; font-weight: 900; }
.map-header-profile { display: flex; align-items: center; gap: 6px; font-size: .9rem; font-weight: 700; }
.map-header-stars   { font-size: .9rem; }

.map-body { padding: 20px 16px 48px; max-width: 540px; margin: 0 auto; }

.level-section { margin-bottom: 24px; }
.level-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.level-badge {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; font-weight: 900; color: #fff;
  flex-shrink: 0;
}
.level-info { flex: 1; }
.level-name { font-size: 1.05rem; font-weight: 900; }
.level-tagline { font-size: .82rem; color: var(--muted); }

.skill-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 18px;
  padding: 14px 16px;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: all .15s;
}
.skill-card:hover:not(.locked) { border-color: var(--primary); transform: translateX(3px); }
.skill-card.locked { opacity: .45; cursor: default; }
.skill-card.completed { border-color: var(--primary); background: #f1f8f2; }

.skill-emoji { font-size: 1.8rem; flex-shrink: 0; }
.skill-info  { flex: 1; }
.skill-name  { font-size: 1rem; font-weight: 800; }
.skill-sub   { font-size: .8rem; color: var(--muted); margin-top: 2px; }
.skill-stars { font-size: 1rem; margin-left: auto; letter-spacing: 2px; }

.coming-soon-card {
  background: #f5f5f5; border: 2px dashed #bbb;
  border-radius: 18px; padding: 14px 20px;
  margin-bottom: 10px; text-align: center;
  color: #999; font-size: .88rem; font-weight: 700;
}

/* ════════════════════════════════════
   SCREEN 3 — LESSON INTRO
════════════════════════════════════ */
#screen-lesson-intro {
  align-items: center; justify-content: center;
  padding: 32px 20px;
  background: linear-gradient(160deg, #e8f5e9 0%, #fff8e1 100%);
}
.lesson-intro-card {
  max-width: 480px; width: 100%;
  text-align: center;
}
.lesson-level-pill {
  display: inline-block; padding: 5px 18px; border-radius: 999px;
  font-size: .82rem; font-weight: 800; color: #fff; margin-bottom: 16px;
}
.lesson-emoji { font-size: 4rem; margin-bottom: 12px; display: block; }
.lesson-title { font-size: 1.7rem; font-weight: 900; margin-bottom: 8px; }
.lesson-desc  { font-size: 1rem; color: var(--muted); margin-bottom: 28px; line-height: 1.55; }
.lesson-goals { text-align: left; margin-bottom: 28px; }
.lesson-goal-item {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: .92rem; color: var(--text); margin-bottom: 8px;
}
.lesson-goal-item::before { content: '✅'; flex-shrink: 0; }
.lesson-intro-actions { display: flex; flex-direction: column; gap: 10px; align-items: center; }

/* ════════════════════════════════════
   SCREEN 4 — CONCEPT EXPLAINER
════════════════════════════════════ */
#screen-explainer {
  align-items: center; justify-content: center;
  padding: 24px 16px;
  background: linear-gradient(160deg, #fff8e1 0%, #e8f5e9 100%);
}
.explainer-card {
  max-width: 480px; width: 100%;
}
.explainer-badge {
  font-size: 3rem; text-align: center; display: block; margin-bottom: 10px;
}
.explainer-skill-label {
  text-align: center; font-size: .82rem; font-weight: 900; letter-spacing: .1em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
}
.explainer-title {
  text-align: center; font-size: 1.5rem; font-weight: 900; margin-bottom: 20px;
}
.explainer-section { margin-bottom: 18px; }
.explainer-section-label {
  font-size: .75rem; font-weight: 900; letter-spacing: .1em;
  text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
}
.explainer-section-body {
  font-size: 1.05rem; line-height: 1.6; color: var(--text);
}
.explainer-example-box {
  background: #fff8e1; border: 2px solid #ffe082;
  border-radius: 16px; padding: 14px 16px;
  font-size: 1.05rem; color: var(--text); line-height: 1.7;
}
.explainer-tip {
  background: #e8f5e9; border-left: 4px solid var(--primary);
  border-radius: 0 12px 12px 0; padding: 10px 14px;
  font-size: .9rem; color: var(--primary); font-weight: 700;
}

/* ════════════════════════════════════
   SCREEN 5 — ACTIVITY
════════════════════════════════════ */
#screen-activity { background: var(--bg); }

.activity-hud {
  background: var(--primary); color: #fff;
  padding: 12px 16px; display: flex; align-items: center; gap: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
  position: sticky; top: 0; z-index: 100;
}
.activity-hud-back {
  background: rgba(255,255,255,.2); border: none; border-radius: 50%;
  width: 38px; height: 38px; font-size: 1.1rem; color: #fff;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.activity-hud-info { flex: 1; min-width: 0; }
.activity-hud-lesson { font-size: .82rem; opacity: .85; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.activity-hud-skill  { font-size: .92rem; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.activity-hud-right  { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.act-stars-hud { font-size: .9rem; }

/* Progress dots */
.progress-dots {
  display: flex; gap: 5px; align-items: center;
  justify-content: center; padding: 10px 16px 2px;
}
.prog-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--border); transition: all .2s;
}
.prog-dot.done    { background: var(--primary); }
.prog-dot.current { background: var(--accent); width: 18px; border-radius: 4px; }
.prog-dot.mastery { background: var(--gold); }

/* Activity body */
.activity-body {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; padding: 16px 16px 80px;
  max-width: 560px; margin: 0 auto; width: 100%;
}

/* Instruction */
.activity-instruction {
  font-size: 1.1rem; font-weight: 700; color: var(--muted);
  text-align: center; margin-bottom: 6px; line-height: 1.4;
}
.activity-prompt-word {
  font-size: 2.4rem; font-weight: 900; color: var(--text);
  text-align: center; margin-bottom: 4px; letter-spacing: .02em;
}
.activity-prompt-emoji {
  font-size: 3rem; text-align: center; display: block; margin-bottom: 16px;
}

/* Choice grid (4 cards) */
.choice-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 12px; width: 100%; margin-top: 8px;
}
.choice-card {
  background: var(--card); border: 3px solid var(--border);
  border-radius: 20px; padding: 20px 12px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  cursor: pointer; transition: all .15s; min-height: 100px;
  user-select: none;
}
.choice-card:hover:not(.disabled) { border-color: var(--primary); transform: scale(1.03); }
.choice-card.selected  { border-color: var(--primary); background: #e8f5e9; }
.choice-card.correct   { border-color: var(--primary); background: #c8e6c9; animation: pulse-correct .4s; }
.choice-card.wrong     { border-color: var(--red); background: #ffebee; animation: shake .35s; }
.choice-card.disabled  { pointer-events: none; }
.choice-card.dim       { opacity: .4; }
.choice-emoji { font-size: 2.5rem; }
.choice-word  { font-size: 1.1rem; font-weight: 800; }

@keyframes pulse-correct {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.07); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%     { transform: translateX(-6px); }
  75%     { transform: translateX(6px); }
}

/* CVC Builder */
.cvc-target-display {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  margin-bottom: 18px;
}
.cvc-slots {
  display: flex; gap: 10px; justify-content: center;
}
.cvc-slot {
  width: 68px; height: 72px;
  border: 3px dashed var(--border); border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; font-weight: 900; color: var(--text);
  transition: all .15s; background: var(--card);
  cursor: pointer;
}
.cvc-slot.filled { border-style: solid; border-color: var(--primary); background: #e8f5e9; }
.cvc-slot.filled:hover { border-color: var(--red); background: #ffebee; }
.cvc-slot.correct-slot { border-color: var(--primary); background: #c8e6c9; }
.cvc-slot.wrong-slot   { border-color: var(--red); background: #ffebee; animation: shake .35s; }

.cvc-letter-bank {
  display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 16px;
}
.cvc-letter-btn {
  width: 58px; height: 58px; border-radius: 14px;
  border: 3px solid var(--border); background: var(--card);
  font-size: 1.6rem; font-weight: 900; cursor: pointer;
  transition: all .15s; display: flex; align-items: center; justify-content: center;
}
.cvc-letter-btn:hover:not(.used) { border-color: var(--primary); background: #e8f5e9; }
.cvc-letter-btn.used { opacity: .25; pointer-events: none; }

/* Sentence Order */
.sentence-tray {
  display: flex; flex-wrap: wrap; gap: 8px;
  min-height: 64px; background: #f0f7f2;
  border: 2px dashed var(--border); border-radius: 18px;
  padding: 12px 14px; margin-bottom: 16px; align-items: center;
  justify-content: center; width: 100%;
}
.sentence-slot {
  height: 48px; min-width: 60px; border-radius: 10px;
  border: 2px solid var(--border); background: var(--card);
  display: flex; align-items: center; justify-content: center;
  padding: 0 10px; font-size: 1.05rem; font-weight: 800;
  cursor: pointer; transition: all .15s;
}
.sentence-slot.filled { border-color: var(--primary); background: #e8f5e9; }
.sentence-slot.correct-sent { border-color: var(--primary); background: #c8e6c9; }
.sentence-slot.wrong-sent   { border-color: var(--red); background: #ffebee; animation: shake .35s; }

.word-bank {
  display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
  margin-bottom: 16px;
}
.word-chip {
  height: 48px; padding: 0 16px; border-radius: 999px;
  border: 2px solid var(--border); background: var(--card);
  font-size: 1.05rem; font-weight: 800; cursor: pointer;
  transition: all .15s; display: flex; align-items: center;
}
.word-chip:hover:not(.used) { border-color: var(--primary); background: #e8f5e9; }
.word-chip.used { opacity: .25; pointer-events: none; }

/* Sight Word Tap */
.sentence-display {
  background: #fff8e1; border: 2px solid #ffe082;
  border-radius: 18px; padding: 16px 20px;
  font-size: 1.5rem; font-weight: 700; text-align: center;
  line-height: 1.6; margin-bottom: 20px; width: 100%;
}
.sentence-blank {
  display: inline-block; min-width: 80px; height: 36px;
  border-bottom: 3px solid var(--accent); margin: 0 4px;
  vertical-align: bottom; background: transparent;
}

/* Feedback strip */
.feedback-strip {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  padding: 16px 20px 20px; display: flex; flex-direction: column;
  align-items: center; gap: 10px; transform: translateY(100%);
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 -4px 20px rgba(0,0,0,.12);
}
.feedback-strip.show { transform: translateY(0); }
.feedback-strip.correct { background: #e8f5e9; }
.feedback-strip.wrong   { background: #ffebee; }
.feedback-icon  { font-size: 1.5rem; }
.feedback-text  { font-size: 1.05rem; font-weight: 700; color: var(--text); text-align: center; }
.feedback-continue {
  background: var(--primary); color: #fff;
  border: none; border-radius: 999px; padding: 12px 32px;
  font-size: 1rem; font-weight: 800; cursor: pointer;
  font-family: inherit; transition: transform .12s;
}
.feedback-strip.wrong .feedback-continue { background: var(--red); }
.feedback-continue:active { transform: scale(.95); }

/* Help button */
.help-fab {
  position: fixed; bottom: 80px; right: 20px; z-index: 150;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--accent); color: #fff;
  border: none; font-size: 1.3rem; cursor: pointer;
  box-shadow: 0 4px 14px rgba(245,127,23,.45);
  display: flex; align-items: center; justify-content: center;
  transition: transform .12s;
}
.help-fab:active { transform: scale(.9); }
.help-fab.hide { display: none; }

/* Mastery badge */
.mastery-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: #fff8e1; border: 2px solid var(--gold);
  border-radius: 999px; padding: 4px 14px;
  font-size: .82rem; font-weight: 800; color: #e65100;
  margin-bottom: 8px;
}

/* ════════════════════════════════════
   SCREEN 6 — LESSON END
════════════════════════════════════ */
#screen-lesson-end {
  align-items: center; justify-content: center;
  padding: 32px 20px;
  background: linear-gradient(160deg, #e8f5e9 0%, #fff8e1 100%);
}
.lesson-end-card { max-width: 420px; width: 100%; text-align: center; }
.lesson-end-emoji { font-size: 4rem; margin-bottom: 12px; display: block; }
.lesson-end-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 6px; }
.lesson-end-msg   { font-size: 1rem; color: var(--muted); margin-bottom: 28px; line-height: 1.55; }

.star-row {
  display: flex; justify-content: center; gap: 12px;
  margin-bottom: 24px;
}
.star-item { font-size: 2.8rem; opacity: .25; transition: all .3s; }
.star-item.earned { opacity: 1; animation: star-pop .4s cubic-bezier(.34,1.56,.64,1) both; }
@keyframes star-pop { from { transform: scale(0); } to { transform: scale(1); } }

.lesson-end-summary {
  background: var(--bg); border-radius: 16px; padding: 14px 18px;
  margin-bottom: 24px; text-align: left;
}
.lesson-end-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: .9rem; padding: 5px 0; border-bottom: 1px solid var(--border);
}
.lesson-end-row:last-child { border: none; }
.lesson-end-row-label { color: var(--muted); font-weight: 600; }
.lesson-end-row-value { font-weight: 800; }

.review-note {
  background: #fff3e0; border: 2px solid #ffcc02;
  border-radius: 14px; padding: 12px 16px;
  font-size: .88rem; color: #e65100; font-weight: 700;
  text-align: left; margin-bottom: 20px; line-height: 1.5;
}
.lesson-end-actions { display: flex; flex-direction: column; gap: 10px; align-items: center; }

/* ════════════════════════════════════
   SCREEN 7 — LEVEL COMPLETE
════════════════════════════════════ */
#screen-level-up {
  align-items: center; justify-content: center;
  padding: 32px 20px;
  background: linear-gradient(160deg, #1b5e20 0%, #1a237e 100%);
  color: #fff;
}
.level-up-card { max-width: 420px; width: 100%; text-align: center; }
.level-up-badge  { font-size: 5rem; display: block; margin-bottom: 12px; animation: float 2s ease-in-out infinite alternate; }
@keyframes float { from { transform: translateY(0) scale(1); } to { transform: translateY(-12px) scale(1.04); } }
.level-up-label  { font-size: .9rem; font-weight: 900; letter-spacing: .15em; opacity: .75; text-transform: uppercase; margin-bottom: 8px; }
.level-up-title  { font-size: 2.2rem; font-weight: 900; margin-bottom: 8px; }
.level-up-unlock { font-size: 1rem; opacity: .85; margin-bottom: 32px; }
.level-up-can    { background: rgba(255,255,255,.12); border-radius: 18px; padding: 16px 20px; margin-bottom: 28px; text-align: left; }
.level-up-can-item { display: flex; gap: 8px; align-items: flex-start; font-size: .92rem; margin-bottom: 8px; }
.level-up-can-item:last-child { margin: 0; }
.level-up-next   { opacity: .75; font-size: .9rem; margin-bottom: 24px; }

/* ════════════════════════════════════
   EXPLAINER OVERLAY (shown over activity)
════════════════════════════════════ */
#explainer-overlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.55); backdrop-filter: blur(2px);
  align-items: flex-end; justify-content: center; padding: 16px;
}
#explainer-overlay.show { display: flex; }
.explainer-sheet {
  background: var(--card); border-radius: 28px 28px 0 0;
  width: 100%; max-width: 540px; max-height: 85vh;
  overflow-y: auto; padding: 24px 22px 32px;
  animation: slide-up .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slide-up { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.explainer-sheet-close {
  float: right; background: var(--bg); border: none; border-radius: 50%;
  width: 36px; height: 36px; font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* ════════════════════════════════════
   SHARED UTILS
════════════════════════════════════ */
.mt8  { margin-top: 8px; }
.mt16 { margin-top: 16px; }
.mt24 { margin-top: 24px; }
.center { text-align: center; }
.full-w { width: 100%; }
.divider { height: 1px; background: var(--border); margin: 14px 0; }

/* Animate screen in */
.screen.active { animation: screen-fade .2s ease; }

/* ══════════════════════════════════════════════════════
   AUDIO ENGINE
══════════════════════════════════════════════════════ */
const SFX = (() => {
  let ctx = null;
  function init() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
  }
  function tone(freq, dur, type = 'sine', vol = 0.18, t = 0) {
    init();
    const now = ctx.currentTime + t;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, now);
    g.gain.setValueAtTime(vol, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(now); o.stop(now + dur + 0.05);
  }
  return {
    tap()     { tone(660, 0.06, 'sine', 0.10); },
    correct() { tone(523, 0.1); tone(659, 0.15, 'sine', 0.18, 0.1); tone(784, 0.25, 'sine', 0.2, 0.22); },
    wrong()   { tone(300, 0.12, 'sawtooth', 0.12); tone(220, 0.18, 'sawtooth', 0.1, 0.1); },
    hint()    { tone(440, 0.08, 'triangle', 0.12); tone(550, 0.12, 'triangle', 0.10, 0.08); },
    star()    { [880, 1047, 1319].forEach((f, i) => tone(f, 0.12, 'sine', 0.15, i * 0.1)); },
    levelUp() { [261, 329, 392, 523, 659, 880].forEach((f, i) => tone(f, 0.15, 'sine', 0.2, i * 0.09)); },
    complete(){ [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.18, 'sine', 0.22, i * 0.12)); },
  };
})();

/* ══════════════════════════════════════════════════════
   TTS ENGINE  (Web Speech API — no CDN)
══════════════════════════════════════════════════════ */
const TTS = (() => {
  const PREF_KEY = 'kgr1_audio';
  let _on = localStorage.getItem(PREF_KEY) !== 'off';
  let _voices = [];

  function _loadVoices() { _voices = window.speechSynthesis ? speechSynthesis.getVoices() : []; }
  _loadVoices();
  if (window.speechSynthesis) speechSynthesis.addEventListener('voiceschanged', _loadVoices);

  function _bestVoice() {
    const en = _voices.filter(v => v.lang.startsWith('en'));
    // Prefer clear female/neutral voices known to be child-friendly
    return en.find(v => /samantha|karen|zoe|moira|victoria/i.test(v.name))
        || en.find(v => v.localService)
        || en[0] || null;
  }

  function speak(text, rate) {
    if (!_on || !window.speechSynthesis) return;
    speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate  = rate != null ? rate : 0.85;  // slightly slow for early readers
    utt.pitch = 1.05;
    const v = _bestVoice();
    if (v) utt.voice = v;
    speechSynthesis.speak(utt);
  }

  function stop() { if (window.speechSynthesis) speechSynthesis.cancel(); }

  function toggle() {
    _on = !_on;
    try { localStorage.setItem(PREF_KEY, _on ? 'on' : 'off'); } catch(e) {}
    if (!_on) stop();
    return _on;
  }

  function isOn() { return _on; }
  return { speak, stop, toggle, isOn };
})();

/* ══════════════════════════════════════════════════════
   MASTERY ENGINE
══════════════════════════════════════════════════════ */
const Mastery = (() => {
  let _profileIdx = -1;
  let _data     = {};  // { skillId: [true/false, ...] }  last 20 answers
  let _stars    = {};  // { lessonId: 1|2|3 }
  let _sessions = {};  // { skillId: completedSessionCount }
  let _streak   = { lastDate: null, count: 0 };

  function _storageKey(idx) { return `kgr1_mastery_${idx}`; }

  function load(profileIdx) {
    _profileIdx = profileIdx;
    try {
      const saved = JSON.parse(localStorage.getItem(_storageKey(profileIdx)) || 'null');
      _data     = (saved && saved.data)     || {};
      _stars    = (saved && saved.stars)    || {};
      _sessions = (saved && saved.sessions) || {};
      _streak   = (saved && saved.streak)   || { lastDate: null, count: 0 };
    } catch(e) {
      _data = {}; _stars = {}; _sessions = {}; _streak = { lastDate: null, count: 0 };
    }
  }

  function _save() {
    if (_profileIdx < 0) return;
    try {
      localStorage.setItem(_storageKey(_profileIdx), JSON.stringify({
        data: _data, stars: _stars, sessions: _sessions, streak: _streak
      }));
    } catch(e) {}
  }

  function track(skillId, correct) {
    if (!_data[skillId]) _data[skillId] = [];
    _data[skillId].push(correct);
    if (_data[skillId].length > 20) _data[skillId].shift();
    _save();
  }

  function recordSession(skillId) {
    _sessions[skillId] = (_sessions[skillId] || 0) + 1;
    _save();
  }

  function touchStreak() {
    const today = new Date().toISOString().slice(0, 10);
    if (_streak.lastDate === today) return false;
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    _streak.count = (_streak.lastDate === yesterday) ? _streak.count + 1 : 1;
    _streak.lastDate = today;
    _save();
    return true;
  }

  function accuracy(skillId) {
    const d = _data[skillId] || [];
    return d.length < 2 ? null : d.filter(Boolean).length / d.length;
  }

  function sessions(skillId) { return _sessions[skillId] || 0; }
  function streak() { return _streak.count || 0; }

  function needsReview(skillId) {
    const a = accuracy(skillId);
    return a !== null && a < 0.70;
  }

  function isStrong(skillId) {
    const a = accuracy(skillId);
    return a !== null && a >= 0.85;
  }

  // A skill is mastered when the lesson has 2+ stars across 2+ sessions
  function isMastered(skillId, lessonId) {
    return getLessonStars(lessonId) >= 2 && sessions(skillId) >= 2;
  }

  function setLessonStars(lessonId, stars) {
    _stars[lessonId] = Math.max(_stars[lessonId] || 0, stars);
    _save();
  }

  function getLessonStars(lessonId) { return _stars[lessonId] || 0; }

  function totalStars() {
    return Object.values(_stars).reduce((s, v) => s + v, 0);
  }

  return { load, track, recordSession, touchStreak,
           accuracy, sessions, streak, needsReview, isStrong, isMastered,
           setLessonStars, getLessonStars, totalStars };
})();

/* ══════════════════════════════════════════════════════
   SHUFFLE & QUESTION POOL ENGINE
══════════════════════════════════════════════════════ */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const SEEN_KEY = id => `kgr1_seen_${id}`;
const QS_PER_SESSION = 5;

function buildSessionActivities(lesson) {
  const extra = POOLS[lesson.id] || [];
  const fullPool = [...lesson.activities, ...extra].map((q, i) =>
    Object.assign({}, q, { _qid: `${lesson.id}__${i}` })
  );

  let seenIds = new Set();
  try { seenIds = new Set(JSON.parse(localStorage.getItem(SEEN_KEY(lesson.id)) || '[]')); }
  catch(e) {}

  let unseen = fullPool.filter(q => !seenIds.has(q._qid));
  if (unseen.length < QS_PER_SESSION) {
    // All questions exhausted — reset pool
    seenIds = new Set();
    unseen = [...fullPool];
  }

  const shuffled = shuffle(unseen);
  const masteryPool = shuffled.filter(q => q.isMastery);
  const normalPool  = shuffled.filter(q => !q.isMastery);

  let sample;
  if (masteryPool.length > 0 && normalPool.length >= QS_PER_SESSION - 1) {
    sample = shuffle([...normalPool.slice(0, QS_PER_SESSION - 1), masteryPool[0]]);
  } else {
    sample = shuffled.slice(0, QS_PER_SESSION);
  }

  // Shuffle answer choices within each question
  sample = sample.map(q => {
    if (!q.choices) return q;
    return Object.assign({}, q, { choices: shuffle(q.choices) });
  });

  // Persist seen IDs
  sample.forEach(q => seenIds.add(q._qid));
  try { localStorage.setItem(SEEN_KEY(lesson.id), JSON.stringify([...seenIds])); }
  catch(e) {}

  return sample;
}

function $(id) { return document.getElementById(id); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startWithProfile() {
  if (state.profileIdx < 0) return;
  Mastery.load(state.profileIdx);
  renderMap();
  showScreen('screen-map');
}

function selectProfile(idx) {
  state.profileIdx = idx;
  Mastery.load(idx);
  SFX.tap();
  renderMap();
  showScreen('screen-map');
}

function getLevelById(id) { return CURRICULUM.find(l => l.id === id); }

function getSkillById(levelId, skillId) {
  const level = getLevelById(levelId);
  return level ? level.skills.find(s => s.id === skillId) : null;
}

function getLessonById(levelId, skillId, lessonId) {
  const skill = getSkillById(levelId, skillId);
  return skill ? skill.lessons.find(l => l.id === lessonId) : null;
}

// A level unlocks when all skills in the previous level have 2+ stars
// Parent profiles always have full access
function isLevelUnlocked(levelId) {
  if (PROFILES[state.profileIdx]?.isParent) return true;
  if (levelId === 'R0') return true;
  const idx = CURRICULUM.findIndex(l => l.id === levelId);
  if (idx <= 0) return true;
  const prev = CURRICULUM[idx - 1];
  return prev.skills.every(skill => {
    const lesson = skill.lessons[0];
    return lesson && Mastery.getLessonStars(lesson.id) >= 2;
  });
}

// Returns { done, total, levelId } for the unlock progress bar
function levelUnlockProgress(levelId) {
  const idx = CURRICULUM.findIndex(l => l.id === levelId);
  if (idx <= 0) return null;
  const prev = CURRICULUM[idx - 1];
  const done = prev.skills.filter(skill => {
    const lesson = skill.lessons[0];
    return lesson && Mastery.getLessonStars(lesson.id) >= 2;
  }).length;
  return { done, total: prev.skills.length, levelId: prev.id };
}

function openLesson(levelId, skillId, lessonId) {
  const level  = getLevelById(levelId);
  const skill  = getSkillById(levelId, skillId);
  const lesson = getLessonById(levelId, skillId, lessonId);
  if (!level || !skill || !lesson) return;

  state.levelId  = levelId;
  state.skillId  = skillId;
  state.lessonId = lessonId;

  // Populate intro screen
  $('intro-level-pill').textContent  = `${level.badge} Level ${level.id}`;
  $('intro-level-pill').style.background = level.color;
  $('intro-emoji').textContent   = skill.emoji;
  $('intro-title').textContent   = lesson.title;
  $('intro-desc').textContent    = lesson.desc;
  const goalsEl = $('intro-goals');
  goalsEl.innerHTML = lesson.goals.map(g => `<div class="lesson-goal-item">${g}</div>`).join('');

  showScreen('screen-lesson-intro');
}

function goToExplainer() {
  SFX.hint();
  const skill = getSkillById(state.levelId, state.skillId);
  if (!skill) return;
  renderExplainerCard(skill.explainerKey, $('explainer-card-content'), true);
  showScreen('screen-explainer');
}

function goToActivities() {
  SFX.tap();
  state.activityIdx = 0;
  state.answers     = [];
  const lesson = getLessonById(state.levelId, state.skillId, state.lessonId);
  state.sessionActivities = lesson ? buildSessionActivities(lesson) : [];
  renderActivityScreen();
  showScreen('screen-activity');
}

function confirmLeaveLesson() {
  TTS.stop();
  if (confirm('Leave this lesson? Your progress will be lost.')) {
    showScreen('screen-map');
  }
}

/* ── Audio helpers ── */
function toggleAudio() {
  const on = TTS.toggle();
  document.querySelectorAll('.audio-toggle-btn').forEach(b => {
    b.textContent = on ? '🔊' : '🔇';
    b.title = on ? 'Audio on — tap to mute' : 'Audio off — tap to enable';
  });
}

function speakActivity(act) {
  if (!TTS.isOn() || !act) return;
  let parts = [act.instruction || ''];

  switch (act.type) {
    case 'rhyme-choice':
    case 'word-pic-match':
      if (act.prompt) parts.push(act.prompt);
      break;
    case 'sound-choice':
      if (act.prompt) parts.push(`The sound is: ${act.prompt}`);
      break;
    case 'cvc-build':
      if (act.target) parts.push(`Build the word: ${act.target.split('').join(' - ')}`);
      break;
    case 'sight-word-tap':
      if (act.sentence) parts.push(act.sentence.replace(/___/g, 'blank'));
      break;
    case 'sentence-question':
      if (act.sentence)  parts.push(act.sentence);
      if (act.question)  parts.push(act.question);
      break;
    case 'passage-question':
      if (act.question) parts.push(act.question);
      break;
    case 'sentence-order':
      parts.push('Put the words in the right order.');
      break;
  }

  setTimeout(() => TTS.speak(parts.join('. '), 0.82), 350);
}

function speakPassage(text) {
  TTS.speak(text, 0.78);
}

  dots.innerHTML = activities.map((a, i) => {
    let cls = 'prog-dot';
    if (i < state.activityIdx) cls += ' done';
    else if (i === state.activityIdx) cls += ' current';
    if (a.isMastery) cls += ' mastery';
    return `<div class="${cls}"></div>`;
  }).join('');
}

/* ══════════════════════════════════════════════════════
   ACTIVITY RENDERERS
══════════════════════════════════════════════════════ */
function renderActivity(act) {
  const body = $('activity-body');
  hideFeedback();

  let isMasteryBadge = act.isMastery
    ? `<div class="mastery-badge">⭐ Mastery Check</div>` : '';

  switch (act.type) {
    case 'rhyme-choice':
    case 'sound-choice':
    case 'word-pic-match':
      body.innerHTML = buildChoiceActivity(act, isMasteryBadge);
      break;
    case 'cvc-build':
      body.innerHTML = buildCVCActivity(act, isMasteryBadge);
      initCVCState(act);
      break;
    case 'sentence-order':
      body.innerHTML = buildSentenceOrderActivity(act, isMasteryBadge);
      initSentenceState(act);
      break;
    case 'sight-word-tap':
      body.innerHTML = buildSightWordActivity(act, isMasteryBadge);
      break;
    case 'sentence-question':
      body.innerHTML = buildSentenceQuestionActivity(act, isMasteryBadge);
      break;
    case 'passage-question':
      body.innerHTML = buildPassageQuestionActivity(act, isMasteryBadge);
      break;
    default:
      body.innerHTML = `<div class="card"><p>Activity type "${act.type}" coming soon.</p></div>`;
  }

  speakActivity(act);
}

/* ─── Choice Activity (rhyme, sound, word-pic) ─── */
function buildChoiceActivity(act, masteryBadge) {
  const shuffled = [...act.choices].sort(() => Math.random() - 0.5);

  let promptHtml = '';
  if (act.type === 'word-pic-match') {
    promptHtml = `<div class="activity-prompt-word">${act.prompt}</div>`;
  } else if (act.type === 'sound-choice') {
    promptHtml = `<div class="activity-prompt-word" style="font-size:2.8rem">${act.prompt}</div>`;
  } else {
    promptHtml = `
      <div class="activity-prompt-word">${act.prompt}</div>
      <span class="activity-prompt-emoji">${act.promptEmoji}</span>`;
  }

  // Hide word labels for word-pic-match and sound-choice so students
  // must read the prompt and identify the picture — not match text to text.
  const emojiOnly = act.type === 'word-pic-match' || act.type === 'sound-choice';

  const cards = shuffled.map(c => `
    <div class="choice-card" data-correct="${c.correct}" onclick="handleChoiceAnswer(this, ${c.correct}, event)">
      <span class="choice-emoji" style="${emojiOnly ? 'font-size:3.2rem' : ''}">${c.emoji}</span>
      ${emojiOnly ? '' : `<span class="choice-word">${c.word}</span>`}
    </div>`).join('');

  return `
    ${masteryBadge}
    <div class="activity-instruction">${act.instruction}</div>
    ${promptHtml}
    <div class="choice-grid">${cards}</div>`;
}

function handleChoiceAnswer(el, correct, event) {
  if (el.classList.contains('disabled')) return;
  SFX.tap();
  document.querySelectorAll('.choice-card').forEach(c => c.classList.add('disabled'));
  el.classList.add(correct ? 'correct' : 'wrong');
  if (!correct) {
    document.querySelectorAll('.choice-card[data-correct="true"]').forEach(c => {
      setTimeout(() => c.classList.add('correct'), 350);
    });
  }
  recordAnswer(correct);
}

/* ─── CVC Build Activity ─── */
function buildCVCActivity(act, masteryBadge) {
  const slots = act.answer.map((_, i) =>
    `<div class="cvc-slot" id="slot-${i}" onclick="removeCVCLetter(${i})"></div>`).join('');

  const letters = act.letters.map((l, i) =>
    `<button class="cvc-letter-btn" id="letter-${i}" onclick="addCVCLetter('${l}', ${i})">${l}</button>`
  ).join('');

  return `
    ${masteryBadge}
    <div class="activity-instruction">${act.instruction}</div>
    <span class="activity-prompt-emoji" style="margin-bottom:8px">${act.targetEmoji}</span>
    <div class="cvc-target-display">
      <div class="cvc-slots">${slots}</div>
    </div>
    <div class="cvc-letter-bank">${letters}</div>
    <div style="text-align:center;margin-top:16px">
      <button class="btn btn-ghost" onclick="clearCVCSlots()" style="font-size:.85rem;padding:8px 18px">Clear ↩</button>
    </div>`;
}

function initCVCState(act) {
  state.cvcSlots = new Array(act.answer.length).fill(null);
}

function addCVCLetter(letter, btnIdx) {
  SFX.tap();
  const emptyIdx = state.cvcSlots.indexOf(null);
  if (emptyIdx === -1) return;
  state.cvcSlots[emptyIdx] = { letter, btnIdx };
  $(`slot-${emptyIdx}`).textContent = letter;
  $(`slot-${emptyIdx}`).classList.add('filled');
  $(`letter-${btnIdx}`).classList.add('used');
  if (state.cvcSlots.every(s => s !== null)) checkCVC();
}

function removeCVCLetter(slotIdx) {
  const slot = state.cvcSlots[slotIdx];
  if (!slot) return;
  SFX.tap();
  state.cvcSlots[slotIdx] = null;
  const el = $(`slot-${slotIdx}`);
  el.textContent = '';
  el.classList.remove('filled', 'correct-slot', 'wrong-slot');
  $(`letter-${slot.btnIdx}`).classList.remove('used');
}

function clearCVCSlots() {
  SFX.tap();
  state.cvcSlots.forEach((_, i) => {
    if (state.cvcSlots[i]) {
      $(`letter-${state.cvcSlots[i].btnIdx}`).classList.remove('used');
    }
    $(`slot-${i}`).textContent = '';
    $(`slot-${i}`).classList.remove('filled', 'correct-slot', 'wrong-slot');
  });
  state.cvcSlots = state.cvcSlots.map(() => null);
}

function checkCVC() {
  const act   = getCurrentActivity();
  const built = state.cvcSlots.map(s => s.letter).join('');
  const correct = built === act.answer.join('');

  state.cvcSlots.forEach((_, i) => {
    $(`slot-${i}`).classList.add(correct ? 'correct-slot' : 'wrong-slot');
  });

  document.querySelectorAll('.cvc-letter-btn').forEach(b => b.disabled = true);
  document.querySelectorAll('.cvc-slot').forEach(s => s.onclick = null);

  if (!correct) {
    setTimeout(() => clearCVCSlots(), 900);
    setTimeout(() => {
      document.querySelectorAll('.cvc-letter-btn').forEach(b => b.disabled = false);
      state.cvcSlots = state.cvcSlots.map(() => null);
    }, 950);
  }
  recordAnswer(correct);
}

/* ─── Sentence Order Activity ─── */
function buildSentenceOrderActivity(act, masteryBadge) {
  const shuffled = [...act.words].sort(() => Math.random() - 0.5);
  state.sentenceSlots = new Array(act.words.length).fill(null);
  state.wordBankUsed  = new Array(shuffled.length).fill(false);
  state._shuffled     = shuffled;

  const slots = act.words.map((_, i) =>
    `<div class="sentence-slot" id="sent-slot-${i}" onclick="removeSentenceWord(${i})"></div>`
  ).join('');

  const chips = shuffled.map((w, i) =>
    `<button class="word-chip" id="word-chip-${i}" onclick="addSentenceWord('${w}', ${i})">${w}</button>`
  ).join('');

  return `
    ${masteryBadge}
    <div class="activity-instruction">${act.instruction}</div>
    <div class="sentence-tray">${slots}</div>
    <div class="word-bank">${chips}</div>
    <div style="text-align:center">
      <button class="btn btn-ghost" onclick="clearSentence()" style="font-size:.85rem;padding:8px 18px">Clear ↩</button>
    </div>`;
}

function initSentenceState(act) { /* handled in build */ }

function addSentenceWord(word, chipIdx) {
  SFX.tap();
  const emptyIdx = state.sentenceSlots.indexOf(null);
  if (emptyIdx === -1) return;
  state.sentenceSlots[emptyIdx] = { word, chipIdx };
  const el = $(`sent-slot-${emptyIdx}`);
  el.textContent = word;
  el.classList.add('filled');
  $(`word-chip-${chipIdx}`).classList.add('used');
  if (state.sentenceSlots.every(s => s !== null)) checkSentence();
}

function removeSentenceWord(slotIdx) {
  const slot = state.sentenceSlots[slotIdx];
  if (!slot) return;
  SFX.tap();
  state.sentenceSlots[slotIdx] = null;
  const el = $(`sent-slot-${slotIdx}`);
  el.textContent = ''; el.classList.remove('filled','correct-sent','wrong-sent');
  $(`word-chip-${slot.chipIdx}`).classList.remove('used');
}

function clearSentence() {
  SFX.tap();
  state.sentenceSlots.forEach((slot, i) => {
    if (slot) $(`word-chip-${slot.chipIdx}`).classList.remove('used');
    const el = $(`sent-slot-${i}`);
    el.textContent = ''; el.classList.remove('filled','correct-sent','wrong-sent');
  });
  state.sentenceSlots = state.sentenceSlots.map(() => null);
}

function checkSentence() {
  const act     = getCurrentActivity();
  const built   = state.sentenceSlots.map(s => s.word).join(' ');
  const correct_sentence = act.words.join(' ');
  const correct = built === correct_sentence;

  state.sentenceSlots.forEach((_, i) => {
    $(`sent-slot-${i}`).classList.add(correct ? 'correct-sent' : 'wrong-sent');
  });
  document.querySelectorAll('.word-chip').forEach(b => b.disabled = true);

  if (!correct) {
    setTimeout(() => clearSentence(), 900);
    setTimeout(() => document.querySelectorAll('.word-chip').forEach(b => b.disabled = false), 950);
  }
  recordAnswer(correct);
}

/* ─── Sight Word Tap Activity ─── */
function buildSightWordActivity(act, masteryBadge) {
  const sentenceHtml = act.sentenceParts.map((p, i) =>
    i === act.blankIdx
      ? `<span class="sentence-blank" id="sight-blank">___</span>`
      : `<span> ${p} </span>`
  ).join('');

  const shuffled = [...act.choices].sort(() => Math.random() - 0.5);
  const choiceCards = shuffled.map(w => `
    <div class="choice-card" onclick="handleSightWordAnswer(this, '${w}', event)"
      style="min-height:70px" data-word="${w}">
      <span class="choice-word" style="font-size:1.3rem">${w}</span>
    </div>`).join('');

  return `
    ${masteryBadge}
    <div class="activity-instruction">${act.instruction}</div>
    <div class="sentence-display">${sentenceHtml}</div>
    <div class="choice-grid">${choiceCards}</div>`;
}

function handleSightWordAnswer(el, word, event) {
  if (el.classList.contains('disabled')) return;
  SFX.tap();
  const act = getCurrentActivity();
  const correct = word === act.correctAnswer;
  document.querySelectorAll('.choice-card').forEach(c => c.classList.add('disabled'));
  el.classList.add(correct ? 'correct' : 'wrong');
  if (correct && $('sight-blank')) $('sight-blank').textContent = word;
  if (!correct) {
    document.querySelectorAll('.choice-card').forEach(c => {
      if (c.dataset.word === act.correctAnswer) setTimeout(() => c.classList.add('correct'), 350);
    });
  }
  recordAnswer(correct);
}

/* ─── Sentence Question Activity (R4) ─── */
/* Show a full sentence as prompt, ask a question, 4 choices */
function buildSentenceQuestionActivity(act, masteryBadge) {
  const shuffled = [...act.choices].sort(() => Math.random() - 0.5);
  const cards = shuffled.map(c => `
    <div class="choice-card" data-correct="${c.correct}" onclick="handleChoiceAnswer(this, ${c.correct}, event)">
      <span class="choice-emoji">${c.emoji}</span>
      <span class="choice-word">${c.word}</span>
    </div>`).join('');

  return `
    ${masteryBadge}
    <div class="activity-instruction">${act.instruction}</div>
    <div class="sentence-display" style="font-size:1.2rem;margin-bottom:10px">${act.sentence}</div>
    <div style="text-align:center;font-size:1rem;font-weight:800;color:var(--muted);margin-bottom:10px">${act.question}</div>
    <div class="choice-grid">${cards}</div>`;
}

/* ─── Passage Question Activity (R5) ─── */
/* Show a short story, then a comprehension question with 4 choices */
function buildPassageQuestionActivity(act, masteryBadge) {
  const shuffled = [...act.choices].sort(() => Math.random() - 0.5);
  const cards = shuffled.map(c => `
    <div class="choice-card" data-correct="${c.correct}" onclick="handleChoiceAnswer(this, ${c.correct}, event)"
      style="min-height:70px">
      <span class="choice-emoji">${c.emoji || '📌'}</span>
      <span class="choice-word" style="font-size:.95rem;text-align:center">${c.word}</span>
    </div>`).join('');

  const passageLines = act.passage.split('. ').filter(Boolean).map(s =>
    s.endsWith('.') ? s : s + '.').join(' ');

  const passageEscaped = act.passage.replace(/'/g, "\\'").replace(/"/g, '&quot;');
  return `
    ${masteryBadge}
    <div class="activity-instruction" style="margin-bottom:6px">${act.instruction}</div>
    <div style="background:#fff8e1;border:2px solid #ffe082;border-radius:18px;padding:16px 18px;
      font-size:1.05rem;line-height:1.75;margin-bottom:6px;width:100%;color:var(--text);position:relative">
      ${passageLines}
    </div>
    <button onclick="speakPassage('${passageEscaped}')"
      style="display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;
             font-size:.85rem;font-weight:700;color:var(--primary);margin:0 auto 12px;padding:4px 10px">
      🔊 Read passage to me
    </button>
    <div style="text-align:center;font-size:1rem;font-weight:800;color:var(--primary);
      margin-bottom:12px;background:#e8f5e9;border-radius:12px;padding:8px 14px">
      🔎 ${act.question}
    </div>
    <div class="choice-grid">${cards}</div>`;
}

/* ══════════════════════════════════════════════════════
   ANSWER RECORDING & FEEDBACK
══════════════════════════════════════════════════════ */
function getCurrentActivity() {
  return state.sessionActivities[state.activityIdx] || null;
}

function recordAnswer(correct) {
  const act = getCurrentActivity();
  if (!act) return;

  state.answers.push({ correct, isMastery: !!act.isMastery });
  Mastery.track(state.skillId, correct);

  if (correct) SFX.correct(); else SFX.wrong();
  showFeedback(correct, correct ? act.correctFeedback : act.wrongFeedback);
}

function showFeedback(correct, text) {
  const strip = $('feedback-strip');
  strip.className = `feedback-strip ${correct ? 'correct' : 'wrong'}`;
  $('feedback-icon').textContent = correct ? '🎉' : '💡';
  $('feedback-text').textContent = text;
  $('feedback-continue').textContent = isLastActivity() ? 'See Results →' : 'Continue →';
  requestAnimationFrame(() => strip.classList.add('show'));
  $('help-fab').classList.add('hide');
  if (text) TTS.speak(text, 0.9);
}

function hideFeedback() {
  const strip = $('feedback-strip');
  strip.classList.remove('show');
  $('help-fab').classList.remove('hide');
}

function isLastActivity() {
  return state.activityIdx >= state.sessionActivities.length - 1;
}

function continueFeedback() {
  SFX.tap();
  if (isLastActivity()) {
    showLessonEnd();
  } else {
    state.activityIdx++;
    renderActivityScreen();
    showScreen('screen-activity');
  }
}

/* ══════════════════════════════════════════════════════
   HELP OVERLAY  (Concept Explainer over activity)
══════════════════════════════════════════════════════ */
function showHelpOverlay() {
  SFX.hint();
  const skill = getSkillById(state.levelId, state.skillId);
  if (!skill) return;
  const content = $('explainer-sheet-content');
  content.innerHTML = `<button class="explainer-sheet-close" onclick="closeHelpOverlay(null,true)">✕</button>`;
  renderExplainerCard(skill.explainerKey, content, false);
  $('explainer-overlay').classList.add('show');
}

function closeHelpOverlay(event, force) {
  if (force || event.target === $('explainer-overlay')) {
    $('explainer-overlay').classList.remove('show');
  }
}

/* ══════════════════════════════════════════════════════
   LESSON END
══════════════════════════════════════════════════════ */
function showLessonEnd() {
  TTS.stop();
  const lesson  = getLessonById(state.levelId, state.skillId, state.lessonId);
  const skill   = getSkillById(state.levelId, state.skillId);

  const total   = state.answers.length;
  const correct = state.answers.filter(a => a.correct).length;
  const pct     = total > 0 ? correct / total : 0;

  const masteryAns = state.answers.filter(a => a.isMastery);
  const masteryOk  = masteryAns.filter(a => a.correct).length;
  const masteryOf  = masteryAns.length;

  // Star calculation
  let stars = 1;
  if (pct >= 0.85 && masteryOk >= masteryOf) stars = 3;
  else if (pct >= 0.70) stars = 2;

  Mastery.setLessonStars(state.lessonId, stars);
  Mastery.recordSession(state.skillId);
  const newStreakDay = Mastery.touchStreak();
  $('map-total-stars') && ($('map-total-stars').textContent = `⭐ ${Mastery.totalStars()}`);

  const needReview = Mastery.needsReview(state.skillId);

  const reviewNote = needReview
    ? `<div class="review-note">💡 You might benefit from extra practice on this skill. Try the lesson again to build confidence!</div>` : '';

  const streakVal = Mastery.streak();
  const streakNote = newStreakDay && streakVal >= 2
    ? `<div style="text-align:center;margin-bottom:12px;font-size:.95rem;font-weight:700;color:#e65100">🔥 ${streakVal}-day streak! Keep it up!</div>` : '';

  const messages = {
    3: ['Amazing work! 🎉', `You've mastered "${lesson.title}"!`],
    2: ['Well done! 👍', `Good reading! A little more practice will help.`],
    1: ['Keep going! 💪', `This was tricky — try again to build your skill!`],
  };
  const [emoji, msg] = messages[stars] === undefined ? messages[1] : messages[stars];

  const card = $('lesson-end-card');
  card.innerHTML = `
    <span class="lesson-end-emoji">${skill.emoji}</span>
    <div class="lesson-end-title">${emoji}</div>
    <div class="lesson-end-msg">${msg}</div>

    <div class="star-row">
      ${[1,2,3].map(n => `<span class="star-item ${n <= stars ? 'earned' : ''}" style="animation-delay:${(n-1)*0.18}s">⭐</span>`).join('')}
    </div>

    <div class="lesson-end-summary">
      <div class="lesson-end-row">
        <span class="lesson-end-row-label">Correct</span>
        <span class="lesson-end-row-value">${correct} / ${total}</span>
      </div>
      <div class="lesson-end-row">
        <span class="lesson-end-row-label">Mastery Check</span>
        <span class="lesson-end-row-value">${masteryOk} / ${masteryOf} ✅</span>
      </div>
      <div class="lesson-end-row">
        <span class="lesson-end-row-label">Stars Earned</span>
        <span class="lesson-end-row-value">${'⭐'.repeat(stars)}</span>
      </div>
    </div>

    ${reviewNote}
    ${streakNote}

    <div class="lesson-end-actions">
      <button class="btn btn-primary btn-lg full-w" onclick="onLessonEndNext(${stars})">
        ${stars >= 2 ? 'Back to Map →' : 'Try Again 🔄'}
      </button>
      ${stars < 3 ? `<button class="btn btn-ghost full-w" onclick="showLessonEndExplainer()">Review the Concept 💡</button>` : ''}
      <button class="btn btn-ghost full-w" onclick="renderMap(); showScreen(\'screen-map\')">← Map</button>
    </div>
  `;

  showScreen('screen-lesson-end');

  // Animate stars
  setTimeout(() => {
    document.querySelectorAll('.star-item.earned').forEach((el, i) => {
      setTimeout(() => { el.style.opacity = 1; SFX.star(); }, i * 180);
    });
  }, 300);
  if (stars === 3) setTimeout(() => SFX.complete(), 900);
}

function onLessonEndNext(stars) {
  SFX.tap();
  if (stars >= 2) {
    renderMap();
    showScreen('screen-map');
  } else {
    // Retry
    goToActivities();
    showScreen('screen-activity');
  }
}

function showLessonEndExplainer() {
  SFX.hint();
  const skill = getSkillById(state.levelId, state.skillId);
  if (!skill) return;
  const content = $('explainer-sheet-content');
  content.innerHTML = `<button class="explainer-sheet-close" onclick="closeHelpOverlay(null,true)">✕</button>`;
  renderExplainerCard(skill.explainerKey, content, false);
  $('explainer-overlay').classList.add('show');
}
