<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Base-10 Blocks — 2-Digit Subtraction | Kumon Math</title>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Tokens ── */
:root {
  --rod-w:  22px;
  --rod-h:  110px;
  --unit-sz: 20px;

  /* Minuend (A row) — what we START with */
  --rod-blue:   #1e88e5;
  --unit-org:   #fb8c00;

  /* Subtrahend (B row) — what gets TAKEN AWAY */
  --rod-sub:    #e53935;
  --unit-sub:   #ff7043;

  /* Borrow states */
  --rod-borrow: #d81b60;   /* rod about to break */
  --unit-borrow:#8e24aa;   /* 10 new ones from broken rod */

  /* Taken / removed */
  --rod-taken:  #ef9a9a;
  --unit-taken: #ffccbc;

  --bg:     linear-gradient(150deg, #e8f5e9 0%, #e3f2fd 100%);
  --card:   #ffffff;
  --border: #cfd8dc;
  --text:   #263238;
  --muted:  #78909c;
  --indigo: #1a237e;
  --green:  #1b5e20;
  --yellow: #f9a825;
  --purple: #6a1b9a;
  --red:    #b71c1c;
}

body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text);
  font-size: 16px;
}

/* ════════ HUD ════════ */
#hud {
  position: sticky; top: 0; z-index: 200;
  background: var(--green);
  color: #fff;
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 9px 12px;
  gap: 6px;
  flex-wrap: wrap;
  box-shadow: 0 2px 10px rgba(0,0,0,.3);
}
.hud-pill {
  background: rgba(255,255,255,.15);
  border-radius: 999px;
  padding: 5px 14px;
  font-size: 13px; font-weight: 700;
}
.hud-pill.bump { animation: pill-bump .3s; }
@keyframes pill-bump { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }

/* ════════ SFX toast ════════ */
#sfx-toast {
  position: fixed; top: 60px; right: 12px; z-index: 300;
  background: var(--purple);
  color: #fff;
  padding: 7px 16px;
  border-radius: 12px;
  font-size: 12px; font-weight: 800;
  font-family: 'Courier New', monospace;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
  box-shadow: 0 4px 12px rgba(106,27,154,.45);
}
#sfx-toast.show { opacity: 1; }

/* ════════ Main ════════ */
main { max-width: 660px; margin: 0 auto; padding: 14px 12px 56px; }

.card {
  background: var(--card);
  border-radius: 20px;
  padding: 18px 16px;
  margin-bottom: 12px;
  box-shadow: 0 4px 18px rgba(0,0,0,.1);
}

/* ════════ Problem chips ════════ */
#prob-chips {
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 12px;
}
.chip-group {
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
  align-items: center;
}
.chip-divider {
  width: 1px; height: 26px;
  background: var(--border);
  margin: 0 2px;
  flex-shrink: 0;
}
.p-chip {
  padding: 7px 16px;
  border-radius: 999px;
  border: 2px solid var(--border);
  background: var(--card);
  font-size: .84rem; font-weight: 700;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.p-chip:hover { border-color: var(--rod-blue); color: var(--rod-blue); }
.p-chip.active { background: var(--green); color: #fff; border-color: var(--green); }
#chip-regroup-sub.active { background: #d81b60; border-color: #d81b60; color: #fff; }
#chip-pmr.active          { background: #2e7d32; border-color: #2e7d32; color: #fff; }

/* ════════ Confetti canvas ════════ */
#confetti-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9999;
}

/* ════════ Phase badge ════════ */
#phase-badge {
  text-align: center;
  margin-bottom: 8px;
  min-height: 30px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
}
.phase-pill {
  display: inline-block;
  padding: 4px 16px;
  border-radius: 999px;
  font-size: .82rem; font-weight: 800;
  animation: borrow-pop .3s cubic-bezier(.34,1.56,.64,1);
}

/* ════════ Record panel ════════ */
#record-panel {
  display: none;
  background: #fffde7;
  border: 2px solid #f9a825;
  border-radius: 20px;
  padding: 18px 16px 14px;
  margin-bottom: 12px;
  text-align: center;
  box-shadow: 0 4px 18px rgba(0,0,0,.1);
}
#record-panel.show { display: block; }

#record-label {
  font-size: .78rem; font-weight: 900;
  text-transform: uppercase; letter-spacing: .1em;
  color: #e65100;
  margin-bottom: 14px;
}

/* Column-subtraction layout */
.algo-wrap {
  display: inline-flex;
  flex-direction: column;
  align-items: flex-end;
  font-family: 'Courier New', monospace;
  font-size: 2.1rem; font-weight: 900;
  color: #1a237e;
  gap: 2px;
}
.algo-row     { display: flex; align-items: center; gap: 4px; }
.algo-op      { font-size: 2.1rem; color: #e53935; padding-right: 6px; align-self: center; }
.algo-line    { height: 3px; background: #1a237e; border-radius: 2px; width: 100%; margin: 4px 0; }
.algo-ans-row { display: flex; gap: 4px; }

/* Each digit cell */
.algo-digit {
  position: relative;
  width: 52px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 28px;   /* room for borrow value above */
  border-radius: 8px;
  transition: background .25s;
}
.algo-digit.hl-ones { background: #fff8e1; }
.algo-digit.hl-tens { background: #e3f2fd; }

/* Borrow annotation above digit */
.d-borrow {
  position: absolute;
  top: 2px; left: 50%;
  transform: translateX(-50%) translateY(6px);
  font-size: 1rem; font-weight: 900;
  color: #d81b60;
  opacity: 0;
  transition: opacity .3s, transform .3s;
  white-space: nowrap;
}
.d-borrow.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Original digit — gets struck through */
.d-orig { display: inline-block; transition: color .3s; position: relative; }
.algo-digit.struck .d-orig { color: #ef5350; }
.algo-digit.struck .d-orig::after {
  content: '';
  position: absolute;
  left: -3px; right: -3px; top: 50%;
  height: 3px; background: #ef5350; border-radius: 2px;
}

/* Answer digits */
.algo-ans-digit {
  width: 52px;
  text-align: center;
  color: #2e7d32;
  font-size: 2.1rem; font-weight: 900;
  font-family: 'Courier New', monospace;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity .35s, transform .35s;
}
.algo-ans-digit.show { opacity: 1; transform: translateY(0); }

/* Problem header ════════ */
#prob-header { text-align: center; padding: 14px 20px; }
#prob-eq {
  font-size: 2.4rem; font-weight: 900;
  color: var(--indigo);
  letter-spacing: 6px;
  line-height: 1.2;
}
#prob-tag {
  display: inline-block; margin-top: 6px;
  padding: 3px 14px; border-radius: 999px;
  font-size: .8rem; font-weight: 700;
}
.tag-no  { background: #e8f5e9; color: #2e7d32; }
.tag-yes { background: #fce4ec; color: #c62828; }

/* ════════ Borrow badge ════════ */
#borrow-badge { text-align: center; margin-bottom: 6px; min-height: 34px; }
.borrow-pill {
  display: inline-block;
  background: var(--rod-borrow);
  color: #fff;
  padding: 5px 18px;
  border-radius: 999px;
  font-size: .88rem; font-weight: 800;
  animation: borrow-pop .45s cubic-bezier(.34,1.56,.64,1);
}
@keyframes borrow-pop {
  from { transform: scale(0) translateY(-10px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}
.warn-pill {
  display: inline-block;
  background: var(--rod-sub);
  color: #fff;
  padding: 5px 18px;
  border-radius: 999px;
  font-size: .88rem; font-weight: 800;
  animation: borrow-pop .45s cubic-bezier(.34,1.56,.64,1);
}

/* ════════ Blocks stage ════════ */
#blocks-stage { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.blocks-wrap { min-width: 320px; }

.brow { display: flex; flex-direction: row; align-items: stretch; }
.brow-header { align-items: center; padding-bottom: 4px; }

.br-label {
  width: 48px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: flex-end;
  padding-right: 8px;
  font-size: 1.25rem; font-weight: 800; color: #455a64;
}
.br-label.op-sign { font-size: 1.7rem; color: var(--red); }
.br-label.result-eq { font-size: 1.7rem; color: var(--indigo); }

.br-div {
  width: 3px; flex-shrink: 0;
  background: var(--border);
  margin: 0 6px;
  border-radius: 2px;
}

.col-head {
  flex: 1; text-align: center;
  font-size: .72rem; font-weight: 900;
  text-transform: uppercase; letter-spacing: .1em;
  padding: 2px 0;
}
.col-head.tens { color: var(--rod-blue); }
.col-head.ones { color: var(--unit-org); }

.tens-zone {
  flex: 1;
  display: flex; flex-direction: row;
  gap: 4px;
  align-items: flex-end; justify-content: flex-end;
  min-height: 120px;
  padding: 6px 6px 6px 4px;
  position: relative;
}
.ones-zone {
  flex: 1;
  display: flex; flex-direction: row;
  flex-wrap: wrap;
  gap: 3px;
  align-items: flex-start; align-content: flex-start;
  min-height: 120px;
  padding: 6px 4px 6px 6px;
}

.eq-sep-row { display: flex; align-items: center; padding: 2px 0; }
.eq-sep-label { width: 48px; flex-shrink: 0; text-align: right; padding-right: 8px; font-size: 1.7rem; font-weight: 800; color: var(--indigo); }
.eq-sep-line  { flex: 1; height: 3px; background: var(--indigo); border-radius: 2px; }

/* ════════ Ten Rod ════════ */
.ten-rod {
  width: var(--rod-w);
  height: var(--rod-h);
  flex-shrink: 0;
  border-radius: 5px;
  display: flex; flex-direction: column;
  gap: 1px; padding: 1px;
  background: var(--rod-blue);
  transition: background .3s, box-shadow .3s, opacity .3s;
}
.ten-rod .seg { flex: 1; background: rgba(255,255,255,.28); border-radius: 2px; }

/* Rod colour overrides */
.ten-rod.sub-rod   { background: var(--rod-sub) !important; }
.ten-rod.borrow-rod { background: var(--rod-borrow) !important; }

/* Rod states */
.ten-rod.hl {
  background: #ef6c00 !important;
  animation: rod-pulse .55s ease infinite alternate;
}
.ten-rod.dim { opacity: .22; }

/* Taken: faded red with X overlay */
.ten-rod.taken {
  background: var(--rod-taken) !important;
  opacity: .35;
  position: relative;
}
.ten-rod.taken::after {
  content: '✕';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  font-size: 13px; font-weight: 900; color: #b71c1c;
}

/* Break animation: rod disappears */
.ten-rod.breaking {
  animation: rod-break .55s ease forwards;
}
@keyframes rod-break {
  0%   { transform: scale(1); opacity: 1; }
  40%  { transform: scale(1.12) rotate(6deg); }
  100% { transform: scale(0) rotate(-15deg); opacity: 0; }
}

/* New rod appearing in result */
.ten-rod.result-rod {
  animation: rod-pop-in .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes rod-pop-in {
  0%   { transform: scale(0) rotate(-8deg); opacity: 0; }
  60%  { transform: scale(1.1) rotate(2deg); opacity: 1; }
  100% { transform: scale(1) rotate(0); }
}

.ten-rod.celebrate { animation: celebrate-bob .45s ease infinite alternate !important; }

@keyframes rod-pulse {
  from { box-shadow: 0 0 3px 1px rgba(239,108,0,.35); }
  to   { box-shadow: 0 0 14px 4px rgba(239,108,0,.85); }
}
@keyframes celebrate-bob {
  from { transform: translateY(0) scale(1); }
  to   { transform: translateY(-5px) scale(1.06); }
}

/* ════════ One Unit ════════ */
.one-unit {
  width: var(--unit-sz); height: var(--unit-sz);
  flex-shrink: 0;
  border-radius: 4px;
  background: var(--unit-org);
  transition: background .3s, box-shadow .3s, opacity .3s;
}

/* Unit colour overrides */
.one-unit.sub-unit    { background: var(--unit-sub) !important; }
.one-unit.borrow-unit { background: var(--unit-borrow) !important; }

/* States */
.one-unit.hl {
  background: #e65100 !important;
  animation: unit-pulse .5s ease infinite alternate;
}
.one-unit.dim { opacity: .22; }

.one-unit.taken {
  background: var(--unit-taken) !important;
  opacity: .35;
  position: relative;
}
.one-unit.taken::after {
  content: '✕';
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  font-size: 9px; font-weight: 900; color: #bf360c;
}

.one-unit.unit-new {
  animation: unit-pop-in .3s cubic-bezier(.34,1.56,.64,1) both;
}
.one-unit.borrow-unit.unit-new {
  animation: unit-pop-in .35s cubic-bezier(.34,1.56,.64,1) both;
}
.one-unit.celebrate { animation: celebrate-bob .45s ease infinite alternate !important; }

@keyframes unit-pulse {
  from { box-shadow: 0 0 2px 1px rgba(230,81,0,.3); }
  to   { box-shadow: 0 0 10px 3px rgba(230,81,0,.85); }
}
@keyframes unit-pop-in {
  0%   { transform: scale(0); opacity: 0; }
  60%  { transform: scale(1.15); opacity: 1; }
  100% { transform: scale(1); }
}

/* ════════ Legend ════════ */
.legend {
  display: flex; gap: 12px; flex-wrap: wrap;
  padding: 10px 4px 2px;
  border-top: 1px solid var(--border);
  margin-top: 8px;
}
.legend-item { display: flex; align-items: center; gap: 5px; font-size: .75rem; font-weight: 700; color: var(--muted); }
.l-rod  { width: 11px; height: 28px; border-radius: 2px; }
.l-unit { width: 13px; height: 13px; border-radius: 3px; }

/* ════════ Step dots ════════ */
#step-dots { display: flex; justify-content: center; gap: 7px; padding: 6px 0 2px; }
.sdot { width: 9px; height: 9px; border-radius: 50%; background: var(--border); transition: background .25s, transform .25s; }
.sdot.done    { background: var(--rod-blue); }
.sdot.current { background: var(--yellow); transform: scale(1.3); }

/* ════════ Speech ════════ */
#speech-wrap { position: relative; padding: 14px 16px 14px 22px; min-height: 72px; }
.mascot-icon {
  position: absolute; left: 14px; top: -20px;
  font-size: 2rem;
  animation: mascot-bounce 1.8s ease-in-out infinite;
}
@keyframes mascot-bounce {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}
#speech-text { font-size: 1rem; line-height: 1.6; color: var(--text); padding-left: 4px; }
#speech-text b { color: var(--indigo); }
.sfx-inline {
  font-family: 'Courier New', monospace;
  background: #f3e5f5; color: #6a1b9a;
  border-radius: 4px; padding: 1px 6px;
  font-size: .78em;
}

/* ════════ Controls ════════ */
#controls { display: flex; gap: 10px; flex-wrap: wrap; }
.ctrl-btn {
  flex: 1; min-width: 100px;
  padding: 15px 8px;
  border-radius: 14px; border: none;
  font-size: .95rem; font-weight: 800;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
}
.ctrl-btn:hover  { transform: translateY(-2px); }
.ctrl-btn:active { transform: translateY(0); }

#btn-next {
  background: linear-gradient(135deg, #2e7d32, #1b5e20);
  color: #fff;
  box-shadow: 0 4px 14px rgba(46,125,50,.4);
}
#btn-next:disabled { background: #90a4ae; box-shadow: none; cursor: default; transform: none; }
#btn-retry { background: var(--card); color: var(--green); border: 2.5px solid var(--green); }
#btn-new   { background: linear-gradient(135deg, #1565c0, #283593); color: #fff; box-shadow: 0 4px 14px rgba(21,101,192,.35); }

/* ════════ Responsive ════════ */
@media (max-width: 480px) {
  #prob-eq { font-size: 1.9rem; letter-spacing: 3px; }
  .ctrl-btn { font-size: .85rem; padding: 12px 6px; }
  :root { --rod-w: 18px; --rod-h: 90px; --unit-sz: 17px; }
}
</style>
</head>
<body>

<!-- HUD -->
<div id="hud" role="banner">
  <div class="hud-pill" id="hud-level">🐯 Tiny Tiger</div>
  <div class="hud-pill" id="hud-pts">⭐ 0 pts</div>
  <div class="hud-pill" id="hud-streak">🔥 0 streak</div>
</div>

<!-- SFX toast -->
<div id="sfx-toast" role="status" aria-live="polite"></div>

<!-- Confetti canvas -->
<canvas id="confetti-canvas" aria-hidden="true"></canvas>

<main>

<!-- Problem chips -->
<div id="prob-chips" role="group" aria-label="Choose a problem">
  <div class="chip-group">
    <button class="p-chip active" onclick="loadPreset(0)">54 − 22</button>
    <button class="p-chip"        onclick="loadPreset(1)">42 − 18</button>
    <button class="p-chip"        onclick="loadPreset(2)">63 − 27</button>
    <button class="p-chip"        onclick="loadPreset(3)">71 − 35</button>
    <button class="p-chip"        onclick="newRandom()">🎲 Random</button>
  </div>
  <div class="chip-divider" aria-hidden="true"></div>
  <div class="chip-group">
    <button class="p-chip" id="chip-regroup-sub" onclick="loadRegrouping()" style="border-color:#d81b60;color:#d81b60;">🔄 Regrouping</button>
    <button class="p-chip" id="chip-pmr"         onclick="loadPMR()"        style="border-color:#2e7d32;color:#2e7d32;">📐 P · M · R</button>
  </div>
</div>

<!-- Problem header -->
<div class="card" id="prob-header">
  <div id="prob-eq" aria-label="problem equation">54 − 22 = ?</div>
  <div id="prob-tag" class="tag-no">✅ No Borrowing</div>
</div>

<!-- Phase badge (Pattern / Model / Record) -->
<div id="phase-badge" aria-live="polite"></div>

<!-- Borrow / warning badge -->
<div id="borrow-badge" aria-live="polite"></div>

<!-- Record panel (shown during Phase 3) -->
<div id="record-panel" role="region" aria-label="Written algorithm">
  <div id="record-label">📝 Step 3 — Record</div>
  <div class="algo-wrap">
    <div class="algo-row">
      <div class="algo-digit" id="rd-a-tens">
        <div class="d-borrow" id="rd-a-tens-borrow"></div>
        <div class="d-orig"   id="rd-a-tens-orig"></div>
      </div>
      <div class="algo-digit" id="rd-a-ones">
        <div class="d-borrow" id="rd-a-ones-borrow"></div>
        <div class="d-orig"   id="rd-a-ones-orig"></div>
      </div>
    </div>
    <div class="algo-row">
      <div class="algo-op">−</div>
      <div class="algo-digit" id="rd-b-tens">
        <div class="d-orig" id="rd-b-tens-orig"></div>
      </div>
      <div class="algo-digit" id="rd-b-ones">
        <div class="d-orig" id="rd-b-ones-orig"></div>
      </div>
    </div>
    <div class="algo-line"></div>
    <div class="algo-ans-row">
      <div class="algo-ans-digit" id="rd-ans-tens"></div>
      <div class="algo-ans-digit" id="rd-ans-ones"></div>
    </div>
  </div>
</div>

<!-- Blocks stage -->
<div class="card" id="blocks-stage" role="region" aria-label="Base-10 blocks">
  <div class="blocks-wrap">

    <!-- Column headers -->
    <div class="brow brow-header">
      <div class="br-label"></div>
      <div class="col-head tens">📘 Tens</div>
      <div class="br-div" style="background:transparent"></div>
      <div class="col-head ones">🟠 Ones</div>
    </div>

    <!-- Row A (minuend) -->
    <div class="brow">
      <div class="br-label" id="label-a">54</div>
      <div class="tens-zone" id="a-tens" role="img" aria-label="tens for top number"></div>
      <div class="br-div"></div>
      <div class="ones-zone" id="a-ones" role="img" aria-label="ones for top number"></div>
    </div>

    <!-- Minus operator -->
    <div class="brow" style="align-items:center;">
      <div class="br-label op-sign">−</div>
      <div style="flex:1"></div>
      <div class="br-div" style="background:transparent"></div>
      <div style="flex:1"></div>
    </div>

    <!-- Row B (subtrahend) -->
    <div class="brow">
      <div class="br-label" id="label-b">22</div>
      <div class="tens-zone" id="b-tens" role="img" aria-label="tens being subtracted"></div>
      <div class="br-div"></div>
      <div class="ones-zone" id="b-ones" role="img" aria-label="ones being subtracted"></div>
    </div>

    <!-- Equals line -->
    <div class="eq-sep-row">
      <div class="eq-sep-label">=</div>
      <div class="eq-sep-line"></div>
    </div>

    <!-- Result row -->
    <div class="brow">
      <div class="br-label result-eq" id="label-r">?</div>
      <div class="tens-zone" id="r-tens" role="img" aria-label="tens in result"></div>

<script>
/* ══════════════════════════════════════════════
   CONFETTI ENGINE
══════════════════════════════════════════════ */
const Confetti = (() => {
  const CANVAS = document.getElementById('confetti-canvas');
  const CTX    = CANVAS.getContext('2d');
  const COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bcd','#c77dff','#ff9f43','#00d2d3'];
  let particles = [];
  let raf = null;

  function resize() {
    CANVAS.width  = window.innerWidth;
    CANVAS.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function makePart(x, y) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 4 + Math.random() * 8;
    return {
      x, y,
      vx: Math.cos(angle) * speed,
      vy: -6 - Math.random() * 10,   /* launch upward */
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      w: 8 + Math.random() * 8,
      h: 5 + Math.random() * 5,
      rotation: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.3,
      life: 1.0,
      decay: 0.012 + Math.random() * 0.008,
    };
  }

  function burst(x, y, count = 120) {
    for (let i = 0; i < count; i++) particles.push(makePart(x, y));
    if (!raf) loop();
  }

  function loop() {
    CTX.clearRect(0, 0, CANVAS.width, CANVAS.height);
    particles = particles.filter(p => p.life > 0);
    for (const p of particles) {
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += 0.4;   /* gravity */
      p.vx *= 0.99;
      p.rotation += p.spin;
      p.life -= p.decay;
      CTX.save();
      CTX.globalAlpha = Math.max(0, p.life);
      CTX.translate(p.x, p.y);
      CTX.rotate(p.rotation);
      CTX.fillStyle = p.color;
      CTX.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      CTX.restore();
    }
    if (particles.length > 0) {
      raf = requestAnimationFrame(loop);
    } else {
      raf = null;
      CTX.clearRect(0, 0, CANVAS.width, CANVAS.height);
    }
  }

  /* Burst from the center of the answer block row */
  function celebrate() {
    const el = document.getElementById('r-ones') || document.getElementById('r-tens');
    let x = window.innerWidth / 2, y = window.innerHeight * 0.55;
    if (el) {
      const r = el.getBoundingClientRect();
      x = r.left + r.width / 2;
      y = r.top  + r.height / 2;
    }
    burst(x, y, 130);
    /* second burst slightly offset for richness */
    setTimeout(() => burst(x - 60, y + 20, 70), 180);
    setTimeout(() => burst(x + 60, y + 10, 70), 320);
  }

  return { celebrate };
})();

/* ══════════════════════════════════════════════
   SFX ENGINE  (Web Audio API — no dependencies)
══════════════════════════════════════════════ */
const SFX = (() => {
  let ctx = null;

  function init() {
    if (!ctx) {
      try { ctx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e) { return null; }
    }
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  /* ── Primitives ── */
  function tone(freq, dur, type = 'sine', vol = 0.22, t = 0) {
    const c = init(); if (!c) return;
    const osc = c.createOscillator(), g = c.createGain();
    osc.connect(g); g.connect(c.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, c.currentTime + t);
    g.gain.setValueAtTime(vol, c.currentTime + t);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + t + dur);
    osc.start(c.currentTime + t);
    osc.stop(c.currentTime + t + dur + 0.05);
  }

  function sweep(f1, f2, dur, type = 'sine', vol = 0.18, t = 0) {
    const c = init(); if (!c) return;
    const osc = c.createOscillator(), g = c.createGain();
    osc.connect(g); g.connect(c.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(f1, c.currentTime + t);
    osc.frequency.exponentialRampToValueAtTime(f2, c.currentTime + t + dur);
    g.gain.setValueAtTime(vol, c.currentTime + t);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + t + dur);
    osc.start(c.currentTime + t);
    osc.stop(c.currentTime + t + dur + 0.05);
  }

  function noise(dur, vol = 0.15, t = 0) {
    const c = init(); if (!c) return;
    const len = Math.max(1, Math.ceil(c.sampleRate * dur));
    const buf = c.createBuffer(1, len, c.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const src = c.createBufferSource(), g = c.createGain();
    src.buffer = buf;
    src.connect(g); g.connect(c.destination);
    g.gain.setValueAtTime(vol, c.currentTime + t);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + t + dur);
    src.start(c.currentTime + t);
  }

  /* ── Named sounds ── */
  return {

    // Gentle welcome (step loads)
    intro()  {
      tone(440, 0.14, 'sine', 0.2);
      tone(550, 0.14, 'sine', 0.16, 0.14);
    },

    // Attention ping — look at ones
    look()   {
      tone(660, 0.07, 'triangle', 0.22);
      tone(660, 0.07, 'triangle', 0.18, 0.11);
    },

    // Warning — borrowing signal detected
    signal() {
      sweep(520, 340, 0.22, 'sawtooth', 0.22);
      tone(340, 0.18, 'triangle', 0.2, 0.24);
    },

    // Phase transition — entering model
    model()  {
      tone(392, 0.12, 'sine', 0.2);
      tone(523, 0.15, 'sine', 0.18, 0.13);
    },

    // Rod shattering into ones
    crack()  {
      noise(0.06, 0.45);
      sweep(380, 55,  0.28, 'sawtooth', 0.28, 0.02);
      tone( 120, 0.2, 'sine',           0.18, 0.06);
    },

    // One unit popping in — call with index for stagger
    pop(i = 0) {
      const f = 500 + (i % 5) * 90;
      tone(f, 0.07, 'triangle', 0.16, i * 0.038);
    },

    // Blocks whooshed away
    whoosh() {
      sweep(580, 90, 0.32, 'sine', 0.2);
      noise(0.1, 0.07, 0.1);
    },

    // Record panel rustles open
    paper()  {
      noise(0.05, 0.12);
      tone(850, 0.07, 'triangle', 0.14, 0.04);
      tone(650, 0.08, 'triangle', 0.1,  0.10);
    },

    // Pen scratches a strikethrough
    scratch() {
      noise(0.08, 0.25);
      sweep(900, 180, 0.09, 'sawtooth', 0.14, 0.02);
    },

    // Pen writes a number above the digit
    write()  {
      tone(1047, 0.05, 'triangle', 0.18);
      tone(1319, 0.06, 'triangle', 0.15, 0.07);
    },

    // Answer digit stamps down
    stamp()  {
      tone(330, 0.04, 'square', 0.2);
      tone(440, 0.13, 'sine',   0.2,  0.04);
    },

    // Combo — borrow complete, ready to subtract
    combo()  {
      [440, 554, 659, 880].forEach((f, i) =>
        tone(f, 0.13, 'triangle', 0.22, i * 0.075));
    },

    // Small win — correct, no borrow needed
    ding()   {
      tone( 880, 0.1,  'sine', 0.28);
      tone(1100, 0.15, 'sine', 0.2, 0.1);
    },

    // Big win — borrowing solved
    levelUp() {
      [261, 329, 392, 523, 659, 880].forEach((f, i) =>
        tone(f, 0.15, 'sine', 0.22, i * 0.09));
    },

    // Full celebration — all 3 phases done
    fanfare() {
      [523, 659, 784, 1047].forEach((f, i) => {
        tone(f,       0.2,  'sine',     0.24, i * 0.13);
        tone(f * 1.5, 0.08, 'triangle', 0.1,  i * 0.13 + 0.06);
      });
      // Final chord swell
      [523, 659, 784, 1047].forEach(f => tone(f, 0.5, 'sine', 0.14, 0.6));
    },
  };
})();

/* ══════════════════════════════════════════════

/* ══════════════════════════════════════════════
   DOM HELPERS
══════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const qsa = s => [...document.querySelectorAll(s)];

function makeTenRod(...cls) {
  const rod = document.createElement('div');
  rod.className = 'ten-rod ' + cls.join(' ');
  for (let i = 0; i < 10; i++) {
    const s = document.createElement('div'); s.className = 'seg';
    rod.appendChild(s);
  }
  return rod;
}
function makeOneUnit(...cls) {
  const u = document.createElement('div');
  u.className = 'one-unit ' + cls.join(' ');
  return u;
}
function addAll(selector, cls) { qsa(selector).forEach(el => el.classList.add(cls)); }
function showBadge(html) { $('borrow-badge').innerHTML = html; }
function hideBadge()      { $('borrow-badge').innerHTML = ''; }

/* ══════════════════════════════════════════════
   BLOCK RENDERERS  (A = minuend, B = subtrahend)
══════════════════════════════════════════════ */

/* Render Row A — minuend with optional "taken" marking */
function renderA(at, ao, {
  dimTens = false, dimOnes = false,
  hlTens = false,  hlOnes = false,
  takenTens = 0,   takenOnes = 0,        // first N are marked taken
  borrowTenIdx = -1,                      // which ten rod is breaking (-1 = none)
  extraOnes = 0,                          // borrowed ones to show at end
} = {}) {
  const tZone = $('a-tens'), oZone = $('a-ones');
  tZone.innerHTML = ''; oZone.innerHTML = '';

  for (let i = 0; i < at; i++) {
    const cls = [];
    if (i === borrowTenIdx) cls.push('borrow-rod', 'breaking');
    else if (i < takenTens) cls.push('taken');
    else if (hlTens)        cls.push('hl');
    else if (dimTens)       cls.push('dim');
    tZone.appendChild(makeTenRod(...cls));
  }

  for (let i = 0; i < ao; i++) {
    const cls = [];
    if (i < takenOnes) cls.push('taken');
    else if (hlOnes)   cls.push('hl');
    else if (dimOnes)  cls.push('dim');
    oZone.appendChild(makeOneUnit(...cls));
  }
  // Borrowed ones (purple, pop-in with stagger)
  for (let i = 0; i < extraOnes; i++) {
    const u = makeOneUnit('borrow-unit', 'unit-new');
    u.style.animationDelay = (i * 35) + 'ms';
    oZone.appendChild(u);
  }
}

/* Render Row B — subtrahend (always shown in red) */
function renderB(bt, bo, { hlTens = false, hlOnes = false, dimTens = false, dimOnes = false } = {}) {
  const tZone = $('b-tens'), oZone = $('b-ones');
  tZone.innerHTML = ''; oZone.innerHTML = '';

  for (let i = 0; i < bt; i++) {
    const cls = ['sub-rod'];
    if (hlTens)  cls.push('hl');
    if (dimTens) cls.push('dim');
    tZone.appendChild(makeTenRod(...cls));
  }
  for (let i = 0; i < bo; i++) {
    const cls = ['sub-unit'];
    if (hlOnes)  cls.push('hl');
    if (dimOnes) cls.push('dim');
    oZone.appendChild(makeOneUnit(...cls));
  }
}

/* Render Result row */
function renderResult(rt, ro, { animate = false, celebrate = false } = {}) {
  const tZone = $('r-tens'), oZone = $('r-ones');
  tZone.innerHTML = ''; oZone.innerHTML = '';

  for (let i = 0; i < rt; i++) {
    const cls = [];
    if (animate)   cls.push('result-rod');
    if (celebrate) cls.push('celebrate');
    tZone.appendChild(makeTenRod(...cls));
  }
  for (let i = 0; i < ro; i++) {
    const cls = [];
    if (animate)   cls.push('unit-new');
    if (celebrate) cls.push('celebrate');
    oZone.appendChild(makeOneUnit(...cls));
  }
}

function clearResult() { $('r-tens').innerHTML = ''; $('r-ones').innerHTML = ''; }

/* ══════════════════════════════════════════════
   STEP BUILDER
══════════════════════════════════════════════ */
function buildSteps(a, b) {
  const at = Math.floor(a / 10), ao = a % 10;
  const bt = Math.floor(b / 10), bo = b % 10;
  const needsBorrow = ao < bo;

  /* ────────────────────────────
     NO-BORROW PATH
  ──────────────────────────── */
  if (!needsBorrow) {
    const ro = ao - bo, rt = at - bt;

    return [
      /* 0 — Start */
      {
        speech: `Let's subtract! We start with <b>${a}</b> and take away <b>${b}</b>. 🧱<br>
                 Blue rods = tens. Orange squares = ones.<br>
                 Red blocks show what gets <b>taken away</b>.`,
        render() {
          renderA(at, ao); renderB(bt, bo);
          clearResult(); $('label-r').textContent = '?'; hideBadge();
        },
        audio() { SFX.intro(); }
      },
      /* 1 — Highlight ones */
      {
        speech: `Start with the <b>ONES</b>!<br>
                 We have <b>${ao}</b> ones. We take away <b>${bo}</b> ones.<br>
                 <b>${ao} − ${bo}</b> … do we have enough? Let's check! 👀`,
        render() {
          renderA(at, ao, { dimTens: true, hlOnes: true });
          renderB(bt, bo, { dimTens: true, hlOnes: true });
          clearResult(); hideBadge();
        },
        audio() { SFX.look(); }
      },
      /* 2 — Subtract ones */
      {
        speech: `<b>${ao} − ${bo} = ${ro}</b> ones left over! ✅<br>
                 Watch: ${bo} ones get taken away (marked ✕),<br>and <b>${ro}</b> ones go to the answer.`,
        render() {
          renderA(at, ao, { dimTens: true, takenOnes: bo });
          renderB(bt, bo, { dimTens: true });
          renderResult(0, ro, { animate: true }); hideBadge();
        },
        audio() { SFX.whoosh(); }
      },
      /* 3 — Highlight tens */
      {
        speech: `Now the <b>TENS</b>!<br>
                 We have <b>${at}</b> rods. We take away <b>${bt}</b> rod${bt !== 1 ? 's' : ''}.<br>
                 <b>${at} − ${bt}</b> = ?`,
        render() {
          renderA(at, ao, { hlTens: true, dimOnes: true });
          renderB(bt, bo, { hlTens: true, dimOnes: true });
          renderResult(0, ro); hideBadge();
        },
        audio() { SFX.look(); }
      },
      /* 4 — Subtract tens */
      {
        speech: `<b>${at} − ${bt} = ${rt}</b> ten${rt !== 1 ? 's' : ''}! 💪<br>
                 ${bt} rod${bt !== 1 ? 's' : ''} get taken away, and <b>${rt}</b> go to the answer.`,
        render() {
          renderA(at, ao, { takenTens: bt, dimOnes: true });
          renderB(bt, bo, { dimOnes: true });
          renderResult(rt, ro, { animate: true }); hideBadge();
        },
        audio() { SFX.whoosh(); }
      },
      /* 5 — Answer */
      {
        speech: `🌟 <b>${a} − ${b} = ${ans(a, b)}!</b><br>
                 No borrowing needed — you nailed it! <span class="sfx-inline">[SFX: correct-ding]</span>`,
        render() {
          renderA(at, ao); renderB(bt, bo);
          renderResult(rt, ro, { celebrate: true });
          $('prob-eq').textContent = `${a} − ${b} = ${a - b}`;
          $('label-r').textContent = a - b; hideBadge();
        },
        audio()  { SFX.ding(); },
        sfx: 'correct-ding',
        isAnswer: true, pts: 15,
      }
    ];
  }

  /* ────────────────────────────
     BORROW PATH
  ──────────────────────────── */
  const at2 = at - 1;
  const ao2 = ao + 10;
  const ro = ao2 - bo;
  const rt = at2 - bt;

  return [
    /* 0 — Start */
    {
      speech: `Let's subtract! We have <b>${a}</b> and take away <b>${b}</b>. 🧱<br>
               Red blocks are being taken away.`,
      render() {
        renderA(at, ao); renderB(bt, bo);
        clearResult(); $('label-r').textContent = '?'; hideBadge();
      },
      audio() { SFX.intro(); }
    },
    /* 1 — Highlight ones */
    {
      speech: `Start with the <b>ONES</b>!<br>
               We have <b>${ao}</b> ones, but we need to take away <b>${bo}</b>.`,
      render() {
        renderA(at, ao, { dimTens: true, hlOnes: true });
        renderB(bt, bo, { dimTens: true, hlOnes: true });
        clearResult(); hideBadge();
      },
      audio() { SFX.look(); }
    },
    /* 2 — Not enough! */
    {
      speech: `Uh oh! <b>${ao} − ${bo}</b> doesn't work — we don't have enough ones! 😬<br>
               We need to <b>BORROW a ten</b>! 🏦`,
      render() {
        renderA(at, ao, { dimTens: true }); renderB(bt, bo, { dimTens: true });
        clearResult();
        showBadge(`<span class="warn-pill">⚠️ Not enough ones! Time to borrow!</span>`);
      },
      audio() { SFX.signal(); }
    },
    /* 3 — Break a ten */
    {
      speech: `We borrow <b>1 ten</b> from the tens column! 💥<br>
               Watch it <b>break apart</b> into <b>10 ones</b> (purple).
               Now we have <b>${ao2} ones</b>! <span class="sfx-inline">[SFX: combo-boost]</span>`,
      render() {
        renderA(at, ao, { borrowTenIdx: at - 1, extraOnes: 10 });
        renderB(bt, bo); clearResult();
        showBadge(`<span class="borrow-pill">✊ Borrowed 1 ten → 10 new ones!</span>`);
      },
      audio() { SFX.crack(); for (let i = 0; i < 10; i++) SFX.pop(i); },
      sfx: 'combo-boost',
    },
    /* 4 — After borrow: clear state */
    {
      speech: `The ten is gone — now we have <b>${at2}</b> rod${at2 !== 1 ? 's' : ''} and <b>${ao2} ones</b>.<br>
               The purple ones are the <b>10 borrowed ones</b>. Now we can subtract!`,
      render() {
        renderA(at2, ao, { extraOnes: 10 }); renderB(bt, bo);
        clearResult();
        showBadge(`<span class="borrow-pill">✊ ${at2} tens + ${ao2} ones — ready!</span>`);
      },
      audio() { SFX.combo(); }
    },
    /* 5 — Subtract ones */
    {
      speech: `Now subtract the ones: <b>${ao2} − ${bo} = ${ro}</b>! ✅<br>
               ${bo} ones are taken away (✕), and <b>${ro}</b> go into the answer.`,
      render() {
        renderA(at2, ao, { dimTens: true, extraOnes: 10, takenOnes: bo });
        renderB(bt, bo, { dimTens: true });
        renderResult(0, ro, { animate: true }); hideBadge();
      },
      audio() { SFX.whoosh(); }
    },
    /* 6 — Subtract tens */
    {
      speech: `Subtract the tens: <b>${at2} − ${bt} = ${rt}</b> ten${rt !== 1 ? 's' : ''}! 💪<br>
               ${bt} rod${bt !== 1 ? 's' : ''} taken away, <b>${rt}</b> go in the answer.`,
      render() {
        renderA(at2, ao, { takenTens: bt, dimOnes: true });
        renderB(bt, bo, { dimOnes: true });
        renderResult(rt, ro, { animate: true }); hideBadge();
      },
      audio() { SFX.whoosh(); }
    },
    /* 7 — Answer */
    {
      speech: `🌟 <b>${a} − ${b} = ${a - b}!</b><br>
               You borrowed a ten and conquered it — you're a <b>Borrowing Boss</b>! 🏅
               <span class="sfx-inline">[SFX: level-up-chime]</span>`,
      render() {
        renderA(at, ao); renderB(bt, bo);
        renderResult(rt, ro, { celebrate: true });
        $('prob-eq').textContent = `${a} − ${b} = ${a - b}`;
        $('label-r').textContent = a - b; hideBadge();
      },
      audio()  { SFX.levelUp(); },
      sfx: 'level-up-chime',
      isAnswer: true, pts: 20,
    }
  ];
}

function ans(a, b) { return a - b; }

/* ══════════════════════════════════════════════
   STEP DOTS
══════════════════════════════════════════════ */
function renderDots() {
  const wrap = $('step-dots');
  wrap.innerHTML = '';
  steps.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'sdot' + (i < stepIdx ? ' done' : i === stepIdx ? ' current' : '');
    wrap.appendChild(d);
  });
}

/* ══════════════════════════════════════════════
   RENDER STEP
══════════════════════════════════════════════ */
function renderStep() {
  const s = steps[stepIdx];
  $('speech-text').innerHTML = s.speech;
  s.render();
  if (s.audio) s.audio();
  renderDots();

  const isLast = stepIdx >= steps.length - 1;
  $('btn-next').disabled    = isLast;
  $('btn-next').textContent = isLast ? 'Done! 🎉' : 'Next Step →';

  if (s.sfx) playSFX(s.sfx);
  if (s.isAnswer) {
    pts += s.pts || 10;
    streak++;
    bumpPill('hud-pts');
    bumpPill('hud-streak');
    updateHUD();
    setTimeout(() => Confetti.celebrate(), 120);
    if (streak === 3) setTimeout(() => playSFX('combo-boost'), 1800);
    if (streak === 5) setTimeout(() => playSFX('badge-unlock-fanfare'), 1800);
  }
}

/* ══════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════ */
function nextStep() {
  if (stepIdx < steps.length - 1) { stepIdx++; renderStep(); }
}

function startProblem(a, b) {
  currentA = a;
  currentB = b;
  const borrow = (a % 10) < (b % 10);
  steps   = buildSteps(a, b);
  stepIdx = 0;

  $('prob-eq').textContent  = `${a} − ${b} = ?`;
  $('label-a').textContent  = a;
  $('label-b').textContent  = b;
  $('label-r').textContent  = '?';
  $('prob-tag').textContent = borrow ? '✨ Includes Borrowing' : '✅ No Borrowing';
  $('prob-tag').className   = borrow ? 'tag-yes' : 'tag-no';

  renderStep();
}

function loadPreset(idx) {
  currentPresetIdx = idx;
  document.querySelectorAll('.p-chip').forEach((c, i) => c.classList.toggle('active', i === idx));
  const { a, b } = PRESETS[idx];
  startProblem(a, b);
}

function retryProblem() {
  startProblem(currentA, currentB);
}

function loadRegrouping() {
  currentPresetIdx = -2;
  document.querySelectorAll('.p-chip').forEach(c => c.classList.remove('active'));
  $('chip-regroup-sub').classList.add('active');

  const a = 42, b = 18;
  currentA = a; currentB = b;
  steps = buildSteps(a, b);

  // Prepend a dedicated "What is Regrouping?" concept intro step
  steps.unshift({
    speech: `🔄 <b>Pattern: Regrouping (Borrowing)</b><br><br>
             Sometimes we don't have enough ones to subtract — we need more!<br><br>
             So we <b>break 1 ten into 10 ones</b> and bring them over.<br>
             That swap is called <b>regrouping</b> (or <b>borrowing</b>).<br><br>
             The blue rod below shows <b>1 ten</b> that is about to
             become the <b>10 purple ones</b> beside it. ✨<br>
             Hit <b>Next Step</b> to watch it happen with <b>42 − 18</b>.`,
    render() {
      // Show minuend (42) in its row normally
      renderA(4, 2);
      renderB(1, 8);
      $('label-a').textContent = 42;
      $('label-b').textContent = 18;
      $('label-r').textContent = '?';
      // Result: show 1 rod (about to break) + 10 purple ones side-by-side to
      // illustrate the concept of 1 ten → 10 ones
      const rTens = $('r-tens');
      rTens.innerHTML = '';
      rTens.appendChild(makeTenRod('borrow-rod'));
      const rOnes = $('r-ones');
      rOnes.innerHTML = '';
      for (let i = 0; i < 10; i++) {
        const u = makeOneUnit('borrow-unit', 'unit-new');
        u.style.animationDelay = (i * 30) + 'ms';
        rOnes.appendChild(u);
      }
      hideBadge();
    },
    audio() { SFX.intro(); }
  });

  stepIdx = 0;
  $('prob-eq').textContent  = `42 − 18 = ?`;
  $('prob-tag').textContent = '🔄 Regrouping Pattern';
  $('prob-tag').className   = 'tag-yes';
  renderStep();
}

function newRandom() {
  currentPresetIdx = -1;
  document.querySelectorAll('.p-chip').forEach(c => c.classList.remove('active'));

  const doBorrow = Math.random() < 0.6;
  let a = 54, b = 22;   // safe fallback

  for (let attempts = 0; attempts < 100; attempts++) {
    const at = 2 + Math.floor(Math.random() * 6);          // tens digit of a: 2–7
    const bt = 1 + Math.floor(Math.random() * (at - 1));   // tens digit of b: 1..(at-1)
    const ao = 1 + Math.floor(Math.random() * 8);          // ones digit of a: 1–8
    const bo = 1 + Math.floor(Math.random() * 8);          // ones digit of b: 1–8
    const candidateA = at * 10 + ao;
    const candidateB = bt * 10 + bo;
    const onesOk = doBorrow ? ao < bo : ao >= bo;
    if (candidateA > candidateB && candidateA <= 99 && onesOk) {
      a = candidateA;
      b = candidateB;
      break;
    }
  }

  startProblem(a, b);
}

/* ══════════════════════════════════════════════
   PATTERN · MODEL · RECORD — helpers
══════════════════════════════════════════════ */
function showPhase(text, bg, color) {
  // Append a pill (multiple can stack for the final celebration)
  const pill = document.createElement('span');
  pill.className = 'phase-pill';
  pill.style.background = bg;
  pill.style.color = color;
  pill.innerHTML = text;
  $('phase-badge').appendChild(pill);
}
function clearPhase() { $('phase-badge').innerHTML = ''; }

function showRecordPanel() { $('record-panel').classList.add('show'); }
function hideRecordPanel() { $('record-panel').classList.remove('show'); }

function initRecord(a, b) {
  const at = Math.floor(a / 10), ao = a % 10;
  const bt = Math.floor(b / 10), bo = b % 10;
  $('rd-a-tens-orig').textContent = at;
  $('rd-a-ones-orig').textContent = ao;
  $('rd-b-tens-orig').textContent = bt;
  $('rd-b-ones-orig').textContent = bo;
  ['rd-a-tens','rd-a-ones','rd-b-tens','rd-b-ones'].forEach(id =>
    $(id).classList.remove('struck','hl-ones','hl-tens')
  );
  ['rd-a-tens-borrow','rd-a-ones-borrow'].forEach(id => {
    $(id).textContent = '';
    $(id).classList.remove('show');
  });
  ['rd-ans-tens','rd-ans-ones'].forEach(id => {
    $(id).textContent = '';
    $(id).classList.remove('show');
  });
}

/* Restore borrow-state on the record without re-calling initRecord */
function applyBorrows(at2, ao2) {
  $('rd-a-tens').classList.add('struck');
  $('rd-a-tens-borrow').textContent = at2;
  $('rd-a-tens-borrow').classList.add('show');
  $('rd-a-ones').classList.add('struck');
  $('rd-a-ones-borrow').textContent = ao2;
  $('rd-a-ones-borrow').classList.add('show');
}

/* ══════════════════════════════════════════════
   loadPMR  — Pattern · Model · Record lesson
   Uses 42 − 18 as the worked example
══════════════════════════════════════════════ */
function loadPMR() {
  currentPresetIdx = -3;
  document.querySelectorAll('.p-chip').forEach(c => c.classList.remove('active'));
  $('chip-pmr').classList.add('active');

  const a = 42, b = 18;
  currentA = a; currentB = b;

  const at = Math.floor(a / 10), ao = a % 10;   // 4, 2
  const bt = Math.floor(b / 10), bo = b % 10;   // 1, 8
  const at2 = at - 1, ao2 = ao + 10;            // 3, 12  (after borrow)
  const ro  = ao2 - bo, rt = at2 - bt;           // 4, 2
  const sfxInline = s => `<span class="sfx-inline">[SFX: ${s}]</span>`;

  steps = [

    /* ────── PHASE 1: PATTERN ────── */

    /* Step 0 — overview */
    {
      speech: `📐 <b>Pattern → Model → Record</b><br>
               A 3-step method for subtraction with borrowing!<br><br>
               🎯 <b>Pattern</b> — spot the borrowing signal<br>
               🧱 <b>Model</b> — use blocks to show borrowing<br>
               📝 <b>Record</b> — write the algorithm<br><br>
               We'll use <b>42 − 18</b>. Let's go! 🚀`,
      render() {
        renderA(at, ao); renderB(bt, bo); clearResult();
        $('label-a').textContent = a; $('label-b').textContent = b; $('label-r').textContent = '?';
        hideRecordPanel(); clearPhase(); hideBadge();
      },
      audio() { SFX.intro(); }
    },

    /* Step 1 — look at ones */
    {
      speech: `🎯 <b>Phase 1 — PATTERN</b><br><br>
               Look at the <b>ONES column</b> first.<br>
               Top ones: <b>${ao}</b> &nbsp;|&nbsp; Bottom ones: <b>${bo}</b><br><br>
               Can we subtract? Is <b>${ao}</b> big enough to take <b>${bo}</b> away?`,
      render() {
        renderA(at, ao, { dimTens: true, hlOnes: true });
        renderB(bt, bo, { dimTens: true, hlOnes: true });
        clearResult(); hideRecordPanel(); clearPhase();
        showPhase('🎯 Phase 1 — PATTERN', '#fff3e0', '#e65100');
        hideBadge();
      },
      audio() { SFX.look(); }
    },

    /* Step 2 — signal identified */
    {
      speech: `🎯 <b>BORROWING SIGNAL found!</b><br><br>
               <b>${ao} &lt; ${bo}</b> — the top is smaller than the bottom.<br><br>
               Rule: <span style="color:#e53935;font-weight:800">top ones &lt; bottom ones → must borrow</span><br><br>
               Every time you see this, you know borrowing is coming! ✋`,
      render() {
        renderA(at, ao, { dimTens: true });
        renderB(bt, bo, { dimTens: true });
        clearResult(); hideRecordPanel(); clearPhase();
        showPhase('🎯 Phase 1 — PATTERN', '#fff3e0', '#e65100');
        showBadge(`<span class="warn-pill">⚠️ ${ao} &lt; ${bo} — Borrowing signal! 🎯</span>`);
      },
      audio() { SFX.signal(); }
    },

    /* ────── PHASE 2: MODEL ────── */

    /* Step 3 — set up blocks */
    {
      speech: `🧱 <b>Phase 2 — MODEL</b><br><br>
               Now show it with base-10 blocks.<br>
               We start with <b>${a}</b>: <b>${at}</b> rods + <b>${ao}</b> ones.<br>
               We need to take away <b>${b}</b>: <b>${bt}</b> rod + <b>${bo}</b> ones.`,
      render() {
        renderA(at, ao); renderB(bt, bo); clearResult();
        hideRecordPanel(); clearPhase();
        showPhase('🧱 Phase 2 — MODEL', '#e3f2fd', '#1565c0');
        hideBadge();
      },
      audio() { SFX.model(); }
    },

    /* Step 4 — borrow animation */
    {
      speech: `🧱 <b>Break 1 ten → 10 ones!</b><br>
               Watch the pink rod <b>shatter</b> into 10 purple ones. ${sfxInline('combo-boost')}`,
      render() {
        renderA(at, ao, { borrowTenIdx: at - 1, extraOnes: 10 });
        renderB(bt, bo); clearResult();
        hideRecordPanel(); clearPhase();
        showPhase('🧱 Phase 2 — MODEL', '#e3f2fd', '#1565c0');
        showBadge(`<span class="borrow-pill">✊ 1 ten borrowed → 10 new ones!</span>`);
      },
      sfx: 'combo-boost',
      audio() { SFX.crack(); for (let i = 0; i < 10; i++) SFX.pop(i); }
    },

    /* Step 5 — after-borrow state */
    {
      speech: `🧱 After borrowing: <b>${at2}</b> tens + <b>${ao2}</b> ones.<br>
               (${ao} original + 10 borrowed = ${ao2} total ones.)<br>
               Now we have enough to subtract!`,
      render() {
        renderA(at2, ao, { extraOnes: 10 }); renderB(bt, bo); clearResult();
        hideRecordPanel(); clearPhase();
        showPhase('🧱 Phase 2 — MODEL', '#e3f2fd', '#1565c0');
        showBadge(`<span class="borrow-pill">${at2} tens + ${ao2} ones — ready!</span>`);
      },
      audio() { SFX.combo(); }
    },

    /* Step 6 — subtract ones */
    {
      speech: `🧱 <b>Subtract ones:</b> ${ao2} − ${bo} = <b>${ro}</b> ✅<br>
               ${bo} ones are taken away (✕). <b>${ro}</b> go in the answer row.`,
      render() {
        renderA(at2, ao, { dimTens: true, extraOnes: 10, takenOnes: bo });
        renderB(bt, bo, { dimTens: true }); renderResult(0, ro, { animate: true });
        hideRecordPanel(); clearPhase();
        showPhase('🧱 Phase 2 — MODEL', '#e3f2fd', '#1565c0');
        hideBadge();
      },
      audio() { SFX.whoosh(); }
    },

    /* Step 7 — subtract tens */
    {
      speech: `🧱 <b>Subtract tens:</b> ${at2} − ${bt} = <b>${rt}</b> ✅<br>
               ${bt} rod taken away. <b>${rt}</b> go in the answer row.`,
      render() {
        renderA(at2, ao, { takenTens: bt, dimOnes: true });
        renderB(bt, bo, { dimOnes: true }); renderResult(rt, ro, { animate: true });
        hideRecordPanel(); clearPhase();
        showPhase('🧱 Phase 2 — MODEL', '#e3f2fd', '#1565c0');
        hideBadge();
      },
      audio() { SFX.whoosh(); }
    },

    /* ────── PHASE 3: RECORD ────── */

    /* Step 8 — show clean algorithm */
    {
      speech: `📝 <b>Phase 3 — RECORD</b><br><br>
               Write the algorithm in columns.<br>
               Start clean — no changes yet. We'll record each borrowing step.`,
      render() {
        renderA(at2, ao); renderB(bt, bo); renderResult(rt, ro);
        initRecord(a, b); showRecordPanel(); clearPhase();
        showPhase('📝 Phase 3 — RECORD', '#e8f5e9', '#2e7d32');
        hideBadge();
      },
      audio() { SFX.paper(); }
    },

    /* Step 9 — record borrow on tens */
    {
      speech: `📝 <b>Record the tens borrow:</b><br>
               Cross out the <b>${at}</b> in the tens place (we gave 1 ten away).<br>
               Write <b>${at2}</b> above it in <span style="color:#d81b60;font-weight:800">pink</span>.`,
      render() {
        renderA(at2, ao); renderB(bt, bo); renderResult(rt, ro);
        initRecord(a, b);
        $('rd-a-tens').classList.add('struck', 'hl-tens');
        $('rd-a-tens-borrow').textContent = at2;
        $('rd-a-tens-borrow').classList.add('show');
        showRecordPanel(); clearPhase();
        showPhase('📝 Phase 3 — RECORD', '#e8f5e9', '#2e7d32');
        hideBadge();
      },
      audio() { SFX.scratch(); SFX.write(); }
    },

    /* Step 10 — record borrow on ones */
    {
      speech: `📝 <b>Record the ones borrow:</b><br>
               Cross out the <b>${ao}</b> in the ones place (it grew by 10).<br>
               Write <b>${ao2}</b> above it in <span style="color:#d81b60;font-weight:800">pink</span>.`,
      render() {
        renderA(at2, ao, { extraOnes: 10 }); renderB(bt, bo); renderResult(rt, ro);
        initRecord(a, b); applyBorrows(at2, ao2);
        $('rd-a-ones').classList.add('hl-ones');
        showRecordPanel(); clearPhase();
        showPhase('📝 Phase 3 — RECORD', '#e8f5e9', '#2e7d32');
        hideBadge();
      },
      audio() { SFX.scratch(); SFX.write(); }
    },

    /* Step 11 — solve ones column */
    {
      speech: `📝 <b>Solve ONES:</b><br>
               <b>${ao2} − ${bo} = ${ro}</b><br>
               Write <b>${ro}</b> in the ones place of the answer. ✅`,
      render() {
        renderA(at2, ao, { dimTens: true, extraOnes: 10, takenOnes: bo });
        renderB(bt, bo, { dimTens: true }); renderResult(0, ro);
        initRecord(a, b); applyBorrows(at2, ao2);
        $('rd-a-ones').classList.add('hl-ones');
        $('rd-b-ones').classList.add('hl-ones');
        $('rd-ans-ones').textContent = ro;
        $('rd-ans-ones').classList.add('show');
        showRecordPanel(); clearPhase();
        showPhase('📝 Phase 3 — RECORD', '#e8f5e9', '#2e7d32');
        hideBadge();
      },
      audio() { SFX.stamp(); }
    },

    /* Step 12 — solve tens column */
    {
      speech: `📝 <b>Solve TENS:</b><br>
               <b>${at2} − ${bt} = ${rt}</b><br>
               Write <b>${rt}</b> in the tens place of the answer. ✅`,
      render() {
        renderA(at2, ao, { takenTens: bt, dimOnes: true });
        renderB(bt, bo, { dimOnes: true }); renderResult(rt, ro);
        initRecord(a, b); applyBorrows(at2, ao2);
        $('rd-a-tens').classList.add('hl-tens');
        $('rd-b-tens').classList.add('hl-tens');
        $('rd-ans-ones').textContent = ro; $('rd-ans-ones').classList.add('show');
        $('rd-ans-tens').textContent = rt; $('rd-ans-tens').classList.add('show');
        showRecordPanel(); clearPhase();
        showPhase('📝 Phase 3 — RECORD', '#e8f5e9', '#2e7d32');
        hideBadge();
      },
      audio() { SFX.stamp(); }
    },

    /* Step 13 — celebrate all 3 phases */
    {
      speech: `🌟 <b>42 − 18 = 24!</b><br><br>
               You completed the full method:<br>
               🎯 <b>Pattern</b> ✅ — spotted ${ao} &lt; ${bo}, knew to borrow<br>
               🧱 <b>Model</b> ✅ — broke the ten with blocks<br>
               📝 <b>Record</b> ✅ — wrote every step in the algorithm<br><br>
               ${sfxInline('level-up-chime')}`,
      render() {
        renderA(at, ao); renderB(bt, bo);
        renderResult(rt, ro, { celebrate: true });
        $('label-r').textContent = a - b;
        $('prob-eq').textContent = `${a} − ${b} = ${a - b}`;
        initRecord(a, b); applyBorrows(at2, ao2);
        $('rd-ans-ones').textContent = ro; $('rd-ans-ones').classList.add('show');
        $('rd-ans-tens').textContent = rt; $('rd-ans-tens').classList.add('show');
        showRecordPanel(); clearPhase(); hideBadge();
        // Show all three badges together
        showPhase('🎯 Pattern ✅', '#fff3e0', '#e65100');
        showPhase('🧱 Model ✅',   '#e3f2fd', '#1565c0');
        showPhase('📝 Record ✅',  '#e8f5e9', '#2e7d32');
      },
      sfx: 'level-up-chime',
      audio() { SFX.fanfare(); },
      isAnswer: true, pts: 25,
    }
  ];

  stepIdx = 0;
  $('prob-eq').textContent  = `42 − 18 = ?`;
  $('label-a').textContent  = a;
  $('label-b').textContent  = b;
  $('label-r').textContent  = '?';
  $('prob-tag').textContent = '📐 Pattern · Model · Record';
  $('prob-tag').className   = 'tag-yes';
  renderStep();
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
loadPreset(0);
updateHUD();
</script>
